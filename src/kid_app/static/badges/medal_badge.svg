  <text x="60" y="70" text-anchor="middle" font-size="32" fill="white" font-family="ArialRoundedMTBold">♪</text>
  <text x="38" y="44" font-size="10" fill="white" opacity="0.7">★</text>
  <text x="72" y="44" font-size="10" fill="white" opacity="0.7">★</text>
