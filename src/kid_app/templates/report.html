<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>练习报告 - 竹笛助手</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body { padding-bottom: 80px; }
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; gap: 4px;
      padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
      background: var(--card, #fff); box-shadow: 0 -2px 12px rgba(0,0,0,0.1); z-index: 100;
    }
    .nav a {
      flex: 1; min-width: 0; padding: 14px 8px !important; background: transparent; border-radius: 16px;
      text-align: center; text-decoration: none; color: #7F8C8D; font-size: 16px !important;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .nav a:active { transform: scale(0.95); }
    .nav a.active { background: var(--primary, #FF6B6B); color: white; }
    .nav-icon { font-size: 20px; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/prepare" class="nav-item"><span class="nav-icon">🏠</span><span>准备</span></a>
    <a href="/practice" class="nav-item"><span class="nav-icon">🎵</span><span>练习</span></a>
    <a href="/achievements" class="nav-item"><span class="nav-icon">🏆</span><span>成就</span></a>
    <a href="/report" class="nav-item active"><span class="nav-icon">📊</span><span>报告</span></a>
    <a href="/praise" class="nav-item"><span class="nav-icon">⭐</span><span>表扬</span></a>
  </div>

  <div class="card">
    <h2>{{month_str}} 练习报告</h2>
    <div style="display:flex;gap:12px;margin-bottom:16px;">
      <div style="flex:1;text-align:center;padding:12px;background:#E8F5E9;border-radius:12px;">
        <div style="font-size:28px;font-weight:bold;color:#27AE60;">{{total_mins}}</div>
        <div style="font-size:13px;color:#7F8C8D;">总练习分钟</div>
      </div>
      <div style="flex:1;text-align:center;padding:12px;background:#FFF8E1;border-radius:12px;">
        <div style="font-size:28px;font-weight:bold;color:#F57C00;">{{practice_days}}</div>
        <div style="font-size:13px;color:#7F8C8D;">练习天数</div>
      </div>
    </div>
    <div style="margin-bottom:8px;font-weight:bold;color:#7F8C8D;">日</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center;margin-bottom:4px;font-size:13px;color:#7F8C8D;font-weight:bold;">
      <span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span><span>日</span>
    </div>
    <div class="cal-grid">{{cal_html}}</div>
    <div style="display:flex;gap:8px;align-items:center;margin-top:12px;font-size:13px;color:#7F8C8D;flex-wrap:wrap;">
      <span style="width:16px;height:16px;background:#E8F5E9;border-radius:4px;display:inline-block;"></span> 少量
      <span style="width:16px;height:16px;background:#FFF8E1;border-radius:4px;display:inline-block;"></span> 中等
      <span style="width:16px;height:16px;background:#FFEBEE;border-radius:4px;display:inline-block;"></span> 充足
    </div>
  </div>

  <!-- 当天明细区域 -->
  <div id="dayDetail" class="card" style="display:none;margin-top:12px;">
    <h3 id="detailDate" style="color:#FF6B6B;margin-bottom:12px;"></h3>
    <div id="detailItems" style="display:flex;flex-wrap:wrap;gap:8px;"></div>
    <div id="detailLog" style="margin-top:10px;font-size:14px;color:#7F8C8D;"></div>
    <div id="detailEmpty" style="color:#BDC3C7;font-size:15px;"></div>
  </div>
</body>
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.cal-day:not(.empty)').forEach(function(cell) {
    cell.style.cursor = 'pointer';
    cell.addEventListener('click', function() {
      var date = this.getAttribute('data-date');
      if (!date) return;
      // 移除其他选中态
      document.querySelectorAll('.cal-day.selected').forEach(function(c){ c.classList.remove('selected'); });
      this.classList.add('selected');
      // 加载明细
      var detailDiv = document.getElementById('dayDetail');
      detailDiv.style.display = 'block';
      document.getElementById('detailDate').textContent = date;
      document.getElementById('detailItems').innerHTML = '';
      document.getElementById('detailLog').textContent = '';
      document.getElementById('detailEmpty').textContent = '加载中...';
      fetch('/api/practices/' + date)
        .then(function(r){ return r.json(); })
        .then(function(data) {
          if (data.total_minutes === 0 || (Array.isArray(data.items) && data.items.length === 0)) {
            document.getElementById('detailEmpty').textContent = '这一天没有练习记录';
            document.getElementById('detailItems').innerHTML = '';
            document.getElementById('detailLog').textContent = '';
          } else {
            document.getElementById('detailEmpty').textContent = '';
            var itemsHtml = '';
            data.items.forEach(function(it) {
              itemsHtml += '<span style="background:#E8F5E9;padding:6px 12px;border-radius:20px;font-size:14px;">' + it.item + ' ' + it.minutes + '分钟</span>';
            });
            document.getElementById('detailItems').innerHTML = itemsHtml;
            document.getElementById('detailLog').textContent = data.log || '';
          }
        })
        .catch(function() {
          document.getElementById('detailEmpty').textContent = '加载失败';
        });
    });
  });
});
// 页面整体弹入（和 achievements 一样的风格）
document.addEventListener('DOMContentLoaded', () => {
  const reportCard = document.querySelector('.card');
  gsap.fromTo(reportCard,
    { opacity: 0, scale: 0.82, y: 28 },
    { opacity: 1, scale: 1, y: 0, duration: 0.65, ease: "back.out(2)" }
  );
});
</script>
</body>
