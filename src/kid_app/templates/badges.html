<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>勋章墙 - 竹笛助手</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { padding-bottom: 30px; }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      font-size: 16px;
      color: #FF6B35;
      text-decoration: none;
      font-weight: bold;
    }
    .back-btn:active { opacity: 0.7; }
    .page-title {
      padding: 0 16px 16px;
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }
    .badge-section {
      padding: 0 16px 20px;
    }
    .section-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid transparent;
    }
    .section-title.common { color: #555; border-color: #ddd; }
    .section-title.rare   { color: #7B68EE; border-color: #7B68EE; }
    .section-title.legendary { color: #FF6B35; border-color: #FF6B35; }

    .badge-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (min-width: 500px) {
      .badge-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 800px) {
      .badge-grid { grid-template-columns: repeat(4, 1fr); }
    }

    .badge-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 12px 6px;
      border-radius: 16px;
      background: #f9f9f9;
      transition: transform 0.2s;
    }
    .badge-cell.earned {
      background: linear-gradient(135deg, #FFF8F0, #FFF0E0);
      border: 2px solid #FFD700;
    }
    .badge-cell.locked {
      opacity: 0.45;
      filter: grayscale(0.6);
    }
    .badge-icon {
      font-size: 36px;
      line-height: 1;
      margin-bottom: 6px;
    }
    .badge-name {
      font-size: 12px;
      font-weight: bold;
      color: #333;
      margin-bottom: 3px;
    }
    .badge-cond {
      font-size: 10px;
      color: #999;
      line-height: 1.3;
    }
    .earned .badge-name { color: #FF6B35; }
  </style>
</head>
<body>
  <a href="/achievements" class="back-btn">← 返回成就</a>
  <div class="page-title">🏅 勋章墙</div>

  <div class="badge-section">
    {{body_html}}
  </div>
</body>
</html>
