<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>音乐之旅成就 - 竹笛助手</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0 0 80px; background: #FFF8F0; }

    .top-bar {
      display: flex; align-items: center; padding: 14px 16px 12px;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 5px;
      color: #FF6B35; font-size: 15px; font-weight: 700;
      text-decoration: none; padding: 6px 0;
    }
    .back-btn:active { opacity: 0.6; }
    .page-title {
      flex: 1; text-align: center;
      font-size: 22px; font-weight: 900; color: #333;
      letter-spacing: 1px; margin-right: 52px;
    }

    .stats-bar {
      display: flex; justify-content: center; gap: 8px;
      padding: 0 16px 10px;
      font-size: 12px; color: #bbb; font-weight: 600;
    }
    .stats-bar span { background: #f0ebe3; padding: 3px 12px; border-radius: 20px; }

    .section { padding: 10px 16px 6px; }
    .section-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .section-title {
      font-size: 12px; font-weight: 800; color: #ccc; letter-spacing: 0.5px;
    }
    .section-count {
      font-size: 11px; color: #ccc; font-weight: 600;
      background: #f5f3f0; padding: 2px 8px; border-radius: 20px;
    }
    .section-line { flex: 1; height: 1px; background: #eee; }

    /* 大网格：2列 */
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    @media (min-width: 520px) {
      .badge-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (min-width: 800px) {
      .badge-grid { grid-template-columns: repeat(4, 1fr); gap: 18px; }
    }

    /* 大卡片 */
    .badge-card {
      display: flex; flex-direction: column; align-items: center;
      padding: 18px 12px 14px;
      border-radius: 18px;
      background: #fffdf8;
      border: 2px solid #f0e8d0;
      cursor: pointer;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .badge-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(180,140,20,0.22);
    }
    .badge-card:active { transform: scale(0.97); }

    .badge-card.unlocked::before {
      content: ''; position: absolute; top: -10px; left: -10px;
      width: 52px; height: 52px;
      background: radial-gradient(circle, rgba(255,215,0,0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    .badge-card.locked {
      background: #f9f8f6;
      border-color: #e8e4de;
      filter: saturate(0.25) brightness(0.9);
    }
    .badge-card.locked:hover { filter: saturate(0.4) brightness(0.85); }

    .b-img {
      width: 100px; height: 100px; object-fit: contain;
      pointer-events: none;
      filter: drop-shadow(0 4px 8px rgba(180,140,20,0.35));
    }
    .badge-card.locked .b-img {
      filter: saturate(0) brightness(0.7) drop-shadow(0 2px 5px rgba(0,0,0,0.12));
    }

    .b-name {
      font-size: 18px; font-weight: 900; color: #c8860a;
      margin-top: 10px; text-align: center; line-height: 1.3;
      letter-spacing: 0.5px;
    }
    .badge-card.locked .b-name { color: #c0b898; }

    .b-tag {
      font-size: 11px; font-weight: 400;
      color: #aaa;
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: 5px;
      letter-spacing: 0.5px;
      border: 1px solid rgba(0,0,0,0.08);
      background: rgba(240,235,225,0.5);
    }
    .badge-card[data-tag="突破"]   .b-tag { background: rgba(255,210,210,0.5); border-color: rgba(220,120,120,0.25); }
    .badge-card[data-tag="段位"]   .b-tag { background: rgba(255,240,180,0.5); border-color: rgba(220,180,60,0.30); }
    .badge-card[data-tag="巅峰"]   .b-tag { background: rgba(230,210,255,0.5); border-color: rgba(180,130,230,0.25); }
    .badge-card[data-tag="执着"]   .b-tag { background: rgba(210,230,255,0.5); border-color: rgba(120,170,220,0.25); }
    .badge-card[data-tag="晋级"]   .b-tag { background: rgba(210,250,220,0.5); border-color: rgba(100,200,130,0.25); }

    .b-lock { width: 16px; height: 16px; opacity: 0.3; margin-top: 5px; }

    /* 弹窗 */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    #modal-overlay.active { display: flex; }
    #modal-box {
      background: #fffdf8;
      border-radius: 24px;
      border: 2.5px solid #f0c040;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%; max-width: 310px;
      padding: 30px 26px 24px;
      display: flex; flex-direction: column; align-items: center;
      position: relative;
    }
    #modal-close {
      position: absolute; top: -10px; right: -10px;
      width: 36px; height: 36px;
      background: #fff; border: 2px solid #f0c040;
      border-radius: 50%;
      font-size: 20px; color: #c8860a; line-height: 32px; text-align: center;
      cursor: pointer; font-weight: 900;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    #modal-close:active { transform: scale(0.9); }
    #modal-img-wrap {
      width: 156px; height: 156px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
    }
    #modal-img { width: 156px; height: 156px; object-fit: contain; }
    #modal-name {
      font-size: 26px; font-weight: 900; color: #c8860a;
      text-align: center; margin-bottom: 8px; letter-spacing: 0.5px;
    }
    #modal-tag {
      font-size: 12px; font-weight: 700;
      color: #ccc; letter-spacing: 0.8px; text-transform: uppercase;
      margin-bottom: 18px;
    }
    .modal-divider {
      width: 40px; height: 2px; background: #f0c040;
      border-radius: 2px; margin-bottom: 16px;
    }
    #modal-cond {
      font-size: 16px; color: #666; text-align: center;
      margin-bottom: 6px; font-weight: 600;
    }
    #modal-date {
      font-size: 13px; color: #ccc; margin-bottom: 16px;
    }
    #modal-desc {
      font-size: 16px; color: #a08060;
      text-align: center; font-style: italic;
      line-height: 1.6;
      border-top: 1px solid #f0e8d0;
      padding-top: 16px; width: 100%;
    }
    #modal-hint {
      font-size: 13px; color: #bbb; text-align: center; margin-top: 10px;
    .subj-time span { font-size: 11px; color: #bbb; }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="/achievements" class="back-btn">← 返回</a>
    <div class="page-title">音乐之旅成就</div>
  </div>

  <div class="stats-bar">
    <span>已获得 {{earned_count}} / {{total_count}} 枚</span>
  </div>

  <div id="app">加载中...</div>

  <div id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div id="modal-box">
      <div id="modal-close" onclick="closeModal()">×</div>
      <div id="modal-img-wrap">
        <img id="modal-img" src="" alt="">
      </div>
      <div id="modal-name"></div>
      <div id="modal-tag"></div>
      <div class="modal-divider"></div>
      <div id="modal-cond"></div>
      <div id="modal-date"></div>
      <div id="modal-desc"></div>
      <div id="modal-hint"></div>
    </div>
  </div>

<script>
const DATA = {{data_json}};

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

function cardHTML(d) {
  const lock = !d.achieved
    ? `<img class="b-lock" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23999'%3E%3Cpath d='M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2z'/%3E%3C/svg%3E" alt="🔒">`
    : '';
  return `<div class="badge-card ${d.achieved?'unlocked':'locked'}"
    data-id="${esc(d.id)}"
    data-name="${esc(d.name)}"
    data-tag="${esc(d.typ)}"
    data-cond="${esc(d.condition)}"
    data-desc="${esc(d.description)}"
    data-img="${esc(d.badge_url)}"
    data-date="${d.achieved_at||''}"
    data-locked="${d.achieved?'no':'yes'}"
    onclick="openModal(this)">
    <img class="b-img" src="${esc(d.badge_url)}" alt="${esc(d.name)}" onerror="this.style.display='none'">
    <div class="b-name">${esc(d.name)}</div>
    <div class="b-tag">${esc(d.typ)}</div>
    ${lock}
  </div>`;
}

function buildUI() {
  const unlocked = DATA.filter(d => d.achieved);
  const locked   = DATA.filter(d => !d.achieved);
  let html = '';

  if (unlocked.length) {
    html += `<div class="section">
      <div class="section-header">
        <span class="section-title">已解锁</span>
        <span class="section-count">${unlocked.length}</span>
        <div class="section-line"></div>
      </div>
      <div class="badge-grid">${unlocked.map(cardHTML).join('')}</div>
    </div>`;
  }
  if (locked.length) {
    html += `<div class="section">
      <div class="section-header">
        <span class="section-title">未解锁</span>
        <span class="section-count">${locked.length}</span>
        <div class="section-line"></div>
      </div>
      <div class="badge-grid">${locked.map(cardHTML).join('')}</div>
    </div>`;
  }

  document.getElementById('app').innerHTML = html;
}

function openModal(card) {
  const locked  = card.dataset.locked === 'yes';
  const overlay = document.getElementById('modal-overlay');
  const box     = document.getElementById('modal-box');

  document.getElementById('modal-img').src = card.dataset.img;
  document.getElementById('modal-img').style.filter =
    locked ? 'saturate(0) brightness(0.7)' : '';
  document.getElementById('modal-name').textContent = card.dataset.name;
  document.getElementById('modal-tag').textContent  = card.dataset.tag;
  document.getElementById('modal-cond').textContent = card.dataset.cond;

  const dateEl = document.getElementById('modal-date');
  if (card.dataset.date) {
    const d = new Date(card.dataset.date);
    dateEl.textContent = d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
    dateEl.style.display = '';
  } else {
    dateEl.style.display = 'none';
  }

  document.getElementById('modal-desc').textContent = card.dataset.desc;
  document.getElementById('modal-hint').textContent =
    locked ? '继续加油，下一个成就在等你！' : '';

  overlay.classList.add('active');

  const cr = card.getBoundingClientRect();
  const mr = box.getBoundingClientRect();
  const fromX = cr.left + cr.width/2  - (mr.left + mr.width/2);
  const fromY = cr.top  + cr.height/2 - (mr.top  + mr.height/2);

  gsap.set(box, { x: fromX*0.6, y: fromY*0.6, scale: 0.5, opacity: 0 });
  gsap.set(overlay, { backgroundColor: 'rgba(0,0,0,0)' });

  const tl = gsap.timeline();
  tl.to(overlay, { backgroundColor: 'rgba(0,0,0,0.45)', duration: 0.15, ease:'power2.out' })
    .to(box, { x:0, y:0, scale:1, opacity:1, duration:0.22, ease:'back.out(1.5)' }, 0)
    .from('#modal-img-wrap', { opacity:0, y:6, duration:0.12, ease:'power2.out' }, 0.14)
    .from('#modal-name',    { opacity:0, y:4, duration:0.12, ease:'power2.out' }, 0.17)
    .from('#modal-tag',     { opacity:0, y:4, duration:0.12, ease:'power2.out' }, 0.19)
    .from('.modal-divider', { opacity:0, scaleX:0, duration:0.1,  ease:'back.out(2)' }, 0.21)
    .from('#modal-cond',    { opacity:0, y:4, duration:0.12, ease:'power2.out' }, 0.23)
    .from('#modal-date',    { opacity:0, y:4, duration:0.12, ease:'power2.out' }, 0.25)
    .from('#modal-desc',    { opacity:0, y:4, duration:0.12, ease:'power2.out' }, 0.27)
    .from('#modal-hint',    { opacity:0, y:4, duration:0.12, ease:'power2.out' }, 0.29);
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  const box     = document.getElementById('modal-box');
  gsap.to(box, { scale: 0.8, opacity: 0, duration: 0.15, ease:'power2.in',
    onComplete: () => overlay.classList.remove('active') });
  gsap.to(overlay, { backgroundColor: 'rgba(0,0,0,0)', duration: 0.15 });
}

document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

buildUI();
</script>
</body>
</html>
