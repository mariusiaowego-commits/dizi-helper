<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>音乐之旅成就 - 竹笛助手</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    * { box-sizing: border-box; }
    body { padding-bottom: 80px; }

    /* ── 顶部导航 ── */
    .top-bar {
      display: flex; align-items: center; padding: 14px 16px 0;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 5px;
      color: #FF6B35; font-size: 15px; font-weight: 700;
      text-decoration: none; padding: 6px 0;
    }
    .back-btn:active { opacity: 0.6; }
    .page-title {
      flex: 1; text-align: center;
      font-size: 22px; font-weight: 900; color: #333;
      letter-spacing: 1px; margin-right: 52px;
    }

    /* ── 分类区段 ── */
    .section { padding: 16px 16px 8px; }
    .section-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }
    .section-title {
      font-size: 14px; font-weight: 800; color: #999; letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .section-count {
      font-size: 11px; color: #bbb; font-weight: 600;
      background: #f5f3f0; padding: 2px 8px; border-radius: 20px;
    }
    .section-line {
      flex: 1; height: 1px; background: #eee;
    }

    /* ── 勋章网格 ── */
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media (min-width: 500px) {
      .badge-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (min-width: 720px) {
      .badge-grid { grid-template-columns: repeat(5, 1fr); gap: 16px; }
    }

    /* ── 简化卡片：只保留图片+名字+标签 ── */
    .badge-card {
      display: flex; flex-direction: column; align-items: center;
      padding: 14px 8px 10px;
      border-radius: 14px;
      background: #fffdf8;
      border: 1.5px solid #f0e8d0;
      cursor: pointer;
      position: relative;
      transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    }
    .badge-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 18px rgba(180,140,20,0.18);
      border-color: #f0c040;
    }
    .badge-card:active { transform: translateY(0) scale(0.97); }

    /* 已解锁光晕 */
    .badge-card.unlocked::before {
      content: ''; position: absolute; top: -10px; left: -10px;
      width: 50px; height: 50px;
      background: radial-gradient(circle, rgba(255,215,0,0.2) 0%, transparent 70%);
      pointer-events: none;
    }

    /* 未解锁：整体灰暗 */
    .badge-card.locked {
      background: #f9f8f6;
      border-color: #e8e4de;
      filter: saturate(0.3) brightness(0.92);
    }

    /* 徽章图片 */
    .b-img {
      width: 72px; height: 72px; object-fit: contain;
      filter: drop-shadow(0 3px 7px rgba(180,140,20,0.4));
      transition: filter 0.2s;
    }
    .badge-card:hover .b-img {
      filter: drop-shadow(0 5px 14px rgba(180,140,20,0.55));
    }
    .badge-card.locked .b-img {
      filter: saturate(0) brightness(0.7) drop-shadow(0 2px 5px rgba(0,0,0,0.12));
    }
    .badge-card.locked:hover .b-img {
      filter: saturate(1) brightness(0.72) drop-shadow(0 2px 7px rgba(0,0,0,0.18));
    }

    /* 名字 */
    .b-name {
      font-size: 12px; font-weight: 800; color: #c8860a;
      margin-top: 7px; text-align: center;
      line-height: 1.3; letter-spacing: 0.3px;
    }
    .badge-card.locked .b-name { color: #c0b898; }

    /* 标签：克制品 — 小圆点+文字 */
    .b-tag {
      font-size: 9px; font-weight: 700;
      color: #aaa; letter-spacing: 0.3px;
      margin-top: 4px;
      /* 不使用颜色背景，只用文字色区分 */
    }

    /* 锁图标 */
    .b-lock {
      position: absolute; bottom: 6px; right: 7px;
      width: 14px; height: 14px; opacity: 0.35;
    }

    /* ── 弹窗 ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      pointer-events: none;
    }
    .modal-overlay.active {
      background: rgba(0,0,0,0.45);
      pointer-events: all;
    }
    .modal-box {
      background: #fffdf8;
      border-radius: 24px;
      border: 2px solid #f0c040;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%; max-width: 320px;
      padding: 28px 24px 24px;
      display: flex; flex-direction: column; align-items: center;
      transform: scale(0.7);
      opacity: 0;
    }
    .modal-close {
      position: absolute; top: -8px; right: -8px;
      width: 36px; height: 36px;
      background: #fff; border: 2px solid #f0c040;
      border-radius: 50%;
      font-size: 18px; color: #c8860a; line-height: 32px; text-align: center;
      cursor: pointer; font-weight: 900;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .modal-close:active { transform: scale(0.9); }

    /* 弹窗大图 */
    .modal-badge-wrap {
      width: 140px; height: 140px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .modal-badge-img {
      width: 140px; height: 140px; object-fit: contain;
      filter: drop-shadow(0 6px 18px rgba(180,140,20,0.5));
    }
    .modal-badge-img.locked {
      filter: saturate(0) brightness(0.7) drop-shadow(0 3px 8px rgba(0,0,0,0.15));
    }

    /* 弹窗内容 */
    .modal-name {
      font-size: 20px; font-weight: 900; color: #c8860a;
      text-align: center; margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .modal-tag {
      font-size: 10px; font-weight: 700;
      color: #bbb; letter-spacing: 0.8px; text-transform: uppercase;
      margin-bottom: 16px;
    }
    .modal-divider {
      width: 40px; height: 2px; background: #f0c040;
      border-radius: 2px; margin-bottom: 16px;
    }
    .modal-condition {
      font-size: 13px; color: #666; text-align: center;
      margin-bottom: 6px; font-weight: 600;
    }
    .modal-date {
      font-size: 11px; color: #bbb; margin-bottom: 14px;
    }
    .modal-desc {
      font-size: 13px; color: #a08060;
      text-align: center; font-style: italic;
      line-height: 1.5;
      border-top: 1px solid #f0e8d0;
      padding-top: 14px; width: 100%;
    }
    .modal-locked-hint {
      font-size: 12px; color: #bbb; text-align: center;
      margin-top: 8px;
    }

    /* GSAP入场 */
    .badge-card { opacity: 0; }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="/achievements" class="back-btn">← 返回</a>
    <div class="page-title">音乐之旅成就</div>
  </div>

  <div id="app"></div>

  <!-- 弹窗 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox">
      <div class="modal-close" id="modalClose">×</div>
      <div class="modal-badge-wrap">
        <img class="modal-badge-img" id="mImg" src="" alt="">
      </div>
      <div class="modal-name" id="mName"></div>
      <div class="modal-tag" id="mTag"></div>
      <div class="modal-divider"></div>
      <div class="modal-condition" id="mCond"></div>
      <div class="modal-date" id="mDate"></div>
      <div class="modal-desc" id="mDesc"></div>
      <div class="modal-locked-hint" id="mLockedHint"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script>
  const DATA = {{data_json}};

  function buildUI() {
    const app = document.getElementById('app');
    const unlocked = DATA.filter(d => d.achieved);
    const locked   = DATA.filter(d => !d.achieved);

    let html = '';

    if (unlocked.length) {
      html += `<div class="section">
        <div class="section-header">
          <span class="section-title">已解锁</span>
          <span class="section-count">${unlocked.length}</span>
          <div class="section-line"></div>
        </div>
        <div class="badge-grid">
          ${unlocked.map(d => cardHTML(d)).join('')}
        </div>
      </div>`;
    }

    if (locked.length) {
      html += `<div class="section">
        <div class="section-header">
          <span class="section-title">未解锁</span>
          <span class="section-count">${locked.length}</span>
          <div class="section-line"></div>
        </div>
        <div class="badge-grid">
          ${locked.map(d => cardHTML(d)).join('')}
        </div>
      </div>`;
    }

    app.innerHTML = html;

    // GSAP 入场
    gsap.fromTo('.badge-card',
      { opacity: 0, y: 14 },
      { opacity: 1, y: 0, duration: 0.38, stagger: 0.04, ease: 'back.out(1.7)',
        delay: 0.1 }
    );
  }

  function cardHTML(d) {
    const tagLabel = d.typ;
    return `<div class="badge-card ${d.achieved ? 'unlocked' : 'locked'}"
         data-id="${d.id}"
         data-name="${esc(d.name)}"
         data-tag="${esc(d.typ)}"
         data-cond="${esc(d.condition)}"
         data-desc="${esc(d.description)}"
         data-img="${d.badge_url}"
         data-date="${d.achieved_at || ''}"
         data-locked="${d.achieved ? 'no' : 'yes'}">
      <img class="b-img" src="${d.badge_url}" alt="${esc(d.name)}">
      <div class="b-name">${d.name}</div>
      <div class="b-tag">${tagLabel}</div>
      ${!d.achieved ? `<img class="b-lock" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23999'%3E%3Cpath d='M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM12 17c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z'/%3E%3C/svg%3E" alt="🔒"%3E` : ''}
    </div>`;
  }

  function esc(s) {
    return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ── 弹窗 ──────────────────────────────
  const overlay = document.getElementById('modalOverlay');
  const modalBox = document.getElementById('modalBox');
  const mImg  = document.getElementById('mImg');
  const mName = document.getElementById('mName');
  const mTag  = document.getElementById('mTag');
  const mCond = document.getElementById('mCond');
  const mDate = document.getElementById('mDate');
  const mDesc = document.getElementById('mDesc');
  const mHint = document.getElementById('mLockedHint');

  let isOpen = false;

  function openModal(card) {
    const locked = card.dataset.locked === 'yes';
    mImg.src  = card.dataset.img;
    mImg.className = 'modal-badge-img' + (locked ? ' locked' : '');
    mName.textContent = card.dataset.name;
    mTag.textContent  = card.dataset.tag;
    mCond.textContent = card.dataset.cond;
    mDesc.textContent = card.dataset.desc;

    if (card.dataset.date) {
      const d = new Date(card.dataset.date);
      mDate.textContent = d.toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });
      mDate.style.display = '';
    } else {
      mDate.style.display = 'none';
    }

    mHint.textContent = locked ? '继续加油，下一个成就在等你！' : '';

    isOpen = true;
    overlay.classList.add('active');

    // 点击区域（card所在位置）→ 弹窗中心 的向量
    const cr = card.getBoundingClientRect();
    const mr = modalBox.getBoundingClientRect();
    const fromX = cr.left + cr.width/2 - (mr.left + mr.width/2);
    const fromY = cr.top + cr.height/2  - (mr.top  + mr.height/2);

    const tl = gsap.timeline();
    tl.fromTo(overlay, { backgroundColor: 'rgba(0,0,0,0)' }, { backgroundColor: 'rgba(0,0,0,0.45)', duration: 0.25 })
      .fromTo(modalBox,
        { scale: 0.5, x: fromX * 0.5, y: fromY * 0.5, opacity: 0 },
        { scale: 1, x: 0, y: 0, opacity: 1, duration: 0.35, ease: 'back.out(1.8) },
        0
      );
  }

  function closeModal() {
    if (!isOpen) return;
    isOpen = false;
    gsap.to(overlay, { backgroundColor: 'rgba(0,0,0,0)', duration: 0.2 });
    gsap.to(modalBox, { scale: 0.7, opacity: 0, duration: 0.2,
      onComplete: () => overlay.classList.remove('active') });
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // 点击卡片
  document.getElementById('app').addEventListener('click', e => {
    const card = e.target.closest('.badge-card');
    if (!card) return;

    const ripple = document.createElement('div');
    const rect = card.getBoundingClientRect();
    ripple.style.cssText = `position:fixed;border-radius:50%;background:rgba(255,200,50,0.35);width:60px;height:60px;left:${e.clientX-30}px;top:${e.clientY-30}px;transform:scale(0);animation:rp 0.45s ease-out forwards;pointer-events:none;z-index:5`;
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 500);

    setTimeout(() => openModal(card), 80);
  });

  // hover 动画
  document.getElementById('app').addEventListener('mouseenter', e => {
    const card = e.target.closest('.badge-card');
    if (!card) return;
    gsap.to(card, { y: -4, duration: 0.18, ease: 'power2.out' });
    gsap.to(card.querySelector('.b-img'), { scale: 1.12, duration: 0.25, ease: 'back.out(2.5)' });
  }, true);
  document.getElementById('app').addEventListener('mouseleave', e => {
    const card = e.target.closest('.badge-card');
    if (!card) return;
    gsap.to(card, { y: 0, duration: 0.22, ease: 'power2.out' });
    gsap.to(card.querySelector('.b-img'), { scale: 1, duration: 0.3, ease: 'elastic.out(1,0.5)' });
  }, true);

  // 涟漪keyframes
  const style = document.createElement('style');
  style.textContent = '@keyframes rp { to { transform: scale(3); opacity: 0; } }';
  document.head.appendChild(style);

  buildUI();
  </script>
</body>
</html>
