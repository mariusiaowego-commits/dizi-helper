<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>练习打卡 - 竹笛助手</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body { padding-bottom: 0; }

    /* 固定底部导航 - 与 prepare 风格一致 */
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; gap: 4px;
      padding: 8px 8px calc(env(safe-area-inset-bottom));
      background: var(--card, #fff); box-shadow: 0 -2px 12px rgba(0,0,0,0.1); z-index: 100;
    }
    .nav a {
      flex: 1; min-width: 0; padding: 14px 8px !important; background: transparent; border-radius: 16px;
      text-align: center; text-decoration: none; color: #7F8C8D; font-size: 16px !important;
      box-shadow: none; display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .nav a:active { transform: scale(0.95); }
    .nav a.active { background: #FF6B6B; color: white; }
    .nav-icon { font-size: 20px; }

    /* 计时器保护弹窗 */
    #timerProtectModal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    #timerProtectModal.open { display: flex; }
    .modal-box {
      background: white; border-radius: 20px; padding: 28px 24px;
      max-width: 320px; width: 100%; text-align: center;
    }
    .modal-box h3 { font-size: 20px; color: #FF6B6B; margin-bottom: 12px; }
    .modal-box p { font-size: 16px; color: #555; margin-bottom: 20px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 10px; flex-direction: column; }
    .modal-actions button { padding: 14px; border: none; border-radius: 16px; font-size: 17px; font-weight: bold; cursor: pointer; }
    .modal-actions .btn-stay { background: #4ECDC4; color: white; }
    .modal-actions .btn-leave { background: #FF6B6B; color: white; }

    /* 顶部状态栏 */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 4px 4px; font-size: 14px; color: #7F8C8D; margin-bottom: 8px;
    }
    .top-bar .today-stat { font-size: 15px; color: #4ECDC4; font-weight: bold; }
    .top-bar .server-clock { font-size: 13px; background: #F8F9FA; border-radius: 12px; padding: 4px 12px; }

    /* 三栏容器 */
    .timer-layout {
      display: grid;
      grid-template-columns: 25% 45% 30%;
      gap: 10px;
      align-items: stretch;
      margin-bottom: 12px;
    }
    .panel {
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      overflow: hidden;
    }

    /* 左栏 - 老师要求 */
    .panel-req {
      background: #FFFDF5;
      border: 2px solid #F0D060;
    }
    .panel-req h4 { font-size: 14px; color: #8B6914; margin: 0; display: flex; align-items: center; gap: 6px; }
    .panel-req .req-empty { font-size: 15px; color: #A1887F; font-style: italic; margin: auto 0; text-align: center; width: 100%; }
    .panel-req .req-content { flex: 1; }
    .panel-req .req-highlight {
      background: #FFF8E0;
      border-left: 4px solid #F0D060;
      padding: 12px 14px;
      border-radius: 0 12px 12px 0;
      font-size: 16px;
      color: #5D4037;
      line-height: 1.7;
    }
    .panel-req .req-label { font-size: 12px; color: #8B6914; font-weight: bold; margin-bottom: 8px; }

    /* 中栏 - 计时器 */
    .panel-center {
      background: #F0FCFC;
      border: 2px solid #A0D8D0;
    }
    .panel-center h4 { font-size: 14px; color: #2E7D32; margin: 0; display: flex; align-items: center; gap: 6px; }
    .timer-display {
      font-size: 72px; font-weight: bold; text-align: center;
      color: #FF6B6B; letter-spacing: -2px; line-height: 1;
    }
    .timer-display.running { color: #4ECDC4; }
    .time-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .time-btn { padding: 10px 16px; border: 2px solid #4ECDC4; background: white; border-radius: 20px; font-size: 16px; cursor: pointer; }
    .time-btn.selected { background: #4ECDC4; color: white; }
    .action-btns { display: flex; gap: 10px; justify-content: center; }
    .btn { padding: 12px 24px; border: none; border-radius: 24px; font-size: 17px; font-family: inherit; cursor: pointer; transition: transform 0.1s; }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: #FF6B6B; color: white; }
    .btn-secondary { background: #4ECDC4; color: white; }

    /* 确认区域 */
    .confirm-area {
      display: none; text-align: center;
      background: #EDF7F0; border: 2px solid #A0D8A8;
      border-radius: var(--radius); padding: 14px;
    }
    .confirm-area.show { display: block; }
    .confirm-area p { font-size: 20px; color: #2E7D32; margin-bottom: 12px; }
    .confirm-area .confirm-mins { font-size: 48px; font-weight: bold; color: #27AE60; display: block; margin: 8px 0; }

    /* 快速录入 */
    .quick-add-section {
      display: none;
      background: #FFFCF0; border: 2px solid #F0D060;
      border-radius: var(--radius); padding: 14px;
    }
    .quick-add-section.open { display: block; }
    .quick-add-section h4 { font-size: 15px; color: #8B6914; margin: 0 0 10px; text-align: center; }
    .quick-time-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
    .quick-time-btn { padding: 8px 14px; border: 2px solid #F0D060; background: white; border-radius: 16px; font-size: 15px; cursor: pointer; }
    .quick-time-btn.selected { background: #F0D060; color: #333; }
    .quick-add-actions { display: flex; gap: 8px; justify-content: center; }
    .quick-add-actions .start-btn { background: #FFE066; color: #333; padding: 12px 20px; border: none; border-radius: 16px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .quick-add-actions .btn-cancel { background: white; border: 2px solid #E0E0E0; color: #7F8C8D; padding: 10px 16px; border-radius: 16px; font-size: 15px; cursor: pointer; }

    /* 右栏 - 额外练习时间 */
    .panel-extra {
      background: #F0F9F0;
      border: 2px solid #A0C8A0;
      padding-right: 30px;
      border-radius: var(--radius);
    }
    @media (min-width: 641px) {
      .panel-extra {
        margin-right: -16px;
        border-radius: var(--radius) var(--radius) var(--radius) 0;
      }
    }
    .panel-extra h4 { font-size: 14px; color: #2E7D32; margin: 0; display: flex; align-items: center; gap: 6px; }
    .extra-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    .extra-btn { padding: 8px 12px; border: 2px solid #7CB87C; background: white; border-radius: 16px; font-size: 15px; cursor: pointer; color: #333; }
    .extra-btn.selected { background: #7CB87C; color: white; }
    .extra-custom { display: flex; gap: 8px; justify-content: center; }
    .extra-custom input {
      width: 80px; padding: 8px; border: 2px solid #7CB87C;
      border-radius: 16px; font-size: 15px; text-align: center; font-family: inherit;
    }
    .extra-log-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.7); border: 1px solid #B0D8B0;
      border-radius: 8px; padding: 8px 12px; font-size: 14px;
    }
    .extra-log-item + .extra-log-item { margin-top: 6px; }
    .extra-log-item .extra-mins { color: #2E7D32; font-weight: bold; }
    .extra-log-item .extra-del { background: #FF6B6B; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-size: 13px; cursor: pointer; flex-shrink: 0; }

    /* 练习科目 */
    .item-section { margin-bottom: 12px; }
    .item-section h2 { color: #FF6B6B; font-size: 20px; margin-bottom: 8px; }
    .item-section h2 span { font-size: 14px; color: #7F8C8D; font-weight: normal; }
    .item-filter-wrap { margin-bottom: 10px; }
    .item-filter-wrap input {
      width: 100%; padding: 12px; border-radius: 12px;
      border: 2px solid #E0E0E0; font-size: 16px; box-sizing: border-box;
    }
    .item-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    .item-btn {
      width: 100%; min-width: 0; min-height: 60px; height: 60px; border: none;
      border-radius: 16px; font-size: 13px; font-weight: 700;
      font-family: inherit; color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 0 6px; white-space: normal;
      overflow: hidden; text-overflow: ellipsis;
      transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
      position: relative; overflow: visible;
      box-sizing: border-box;
    }
    .item-btn:active { transform: scale(0.96); filter: brightness(0.92); }
    .item-btn:nth-child(5n+1) { background: #00CED1; }
    .item-btn:nth-child(5n+2) { background: #FF6B9D; }
    .item-btn:nth-child(5n+3) { background: #A855F7; }
    .item-btn:nth-child(5n+4) { background: #FF9F1C; }
    .item-btn:nth-child(5n+5) { background: #10B981; }
    .item-btn.selected { background: #FF4D6D !important; box-shadow: 0 4px 0 #C41E3A; transform: translateY(-2px); }
    .item-btn.selected:active { transform: scale(0.96) translateY(0); box-shadow: none; }
    .item-btn .req-dot { position: absolute; top: 5px; right: 5px; width: 8px; height: 8px; background: #FFD54F; border-radius: 50%; box-shadow: 0 0 4px #FFD54F; }

    /* 金黄色有老师要求的科目 */
    .item-btn.has-req { background: #FFE066 !important; color: #5D4037; box-shadow: 0 4px 0 #E6A800; transform: translateY(-2px); }
    .item-btn.has-req.selected { background: #FF4D6D !important; color: white; box-shadow: 0 4px 0 #C41E3A; transform: translateY(-2px); }
    .item-btn.has-req.selected:active { transform: scale(0.96) translateY(0); box-shadow: none; }

    /* 老师要求气泡 */
    .item-btn-wrap { position: relative; display: inline-block; }
    .req-tooltip {
      position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
      background: #FFE066; color: #333; font-size: 12px; padding: 6px 10px;
      border-radius: 8px; white-space: normal; max-width: 180px; text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15); z-index: 10; pointer-events: none;
    }
    .req-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #FFE066; }
    .item-btn-wrap .req-tooltip { display: none; }
    .item-btn-wrap:hover .req-tooltip { display: block; }

    /* 归档 */
    .archived-toggle { display: block; width: 100%; padding: 12px; background: #F5F5F5; border: 2px dashed #BDBDBD; border-radius: 12px; font-size: 15px; color: #7F8C8D; cursor: pointer; text-align: center; margin-top: 8px; }
    .archived-section { display: none; margin-top: 10px; }
    .archived-section.open { display: block; }
    .archived-section h4 { font-size: 13px; color: #BDBDBD; margin-bottom: 8px; text-align: center; }
    .archived-item-btn { padding: 10px 8px; background: #E0E0E0; color: #7F8C8D; border: none; border-radius: 10px; font-size: 14px; cursor: pointer; text-align: center; text-decoration: line-through; }
    .archived-item-btn.selected { background: #FF6B6B; color: white; }

    /* 今日记录 */
    .today-records { margin-top: 8px; padding-bottom: calc(60px + env(safe-area-inset-bottom)); }
    .today-records h3 { font-size: 18px; color: #4ECDC4; margin-bottom: 10px; }
    .record-item { display: flex; align-items: center; justify-content: space-between; background: #FFF; border: 2px solid #E0E0E0; border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; }
    .record-item .item-name { font-size: 16px; font-weight: bold; color: #333; }
    .record-item .item-mins { font-size: 14px; color: #7F8C8D; margin-top: 2px; }
    .record-item .delete-btn { background: #FF6B6B; color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; flex-shrink: 0; }
    .empty-records { text-align: center; color: #BDBDBD; font-size: 14px; padding: 12px; }

    /* 响应式：iPad竖屏单栏 */
    @media (max-width: 640px) {
      .timer-layout { grid-template-columns: 1fr; }
      .panel-req .req-empty { padding: 20px 0; }
    }
    @media (min-width: 641px) {
      .timer-layout { padding-right: 4px; }
    }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/prepare" class="nav-item"><span class="nav-icon">🏠</span><span>准备</span></a>
    <a href="/practice" class="nav-item active"><span class="nav-icon">🎵</span><span>练习</span></a>
    <a href="/achievements" class="nav-item"><span class="nav-icon">🏆</span><span>成就</span></a>
    <a href="/report" class="nav-item"><span class="nav-icon">📊</span><span>报告</span></a>
    <a href="/praise" class="nav-item"><span class="nav-icon">⭐</span><span>表扬</span></a>
  </div>

  <!-- 计时器保护弹窗 -->
  <div id="timerProtectModal">
    <div class="modal-box">
      <h3>⏱️ 计时器还在跑</h3>
      <p>离开这个页面的话，计时会取消哦！</p>
      <div class="modal-actions">
        <button class="btn-stay" onclick="closeTimerProtect()">继续练习</button>
        <button class="btn-leave" onclick="confirmLeave()">确认离开</button>
      </div>
    </div>
  </div>

  <!-- 顶部状态栏 -->
  <div class="top-bar">
    <div class="today-stat">今日已练习: {{today_mins}} 分钟</div>
    <div class="server-clock" id="serverClock"></div>
  </div>

  <!-- 练习科目选择 -->
  <div class="item-section card">
    <h2>🎵 选择练习项目</h2>
    <div class="item-filter-wrap">
      <input type="text" id="itemFilter" placeholder="🔍 搜索..." oninput="filterItems(this.value)">
    </div>
    {{items_html}}
    <div id="archivedToggleWrap"></div>
  </div>

  <!-- 三栏布局 -->
  <div class="timer-layout" id="timer-layout">

    <!-- 左栏：老师要求 -->
    <div class="panel panel-req">
      <h4>🎯 老师要求</h4>
      <div class="req-content" id="reqTip">
        <div class="req-empty">选择一个科目<br>查看老师要求</div>
      </div>
    </div>

    <!-- 中栏：计时器 -->
    <div class="panel panel-center">
      <h4>⏱️ 计时器</h4>
      <div class="timer-display" id="timer-display">00:00</div>
      <div class="time-btns">
        <button class="time-btn" onclick="setDuration(5)">5分钟</button>
        <button class="time-btn selected" onclick="setDuration(10)">10分钟</button>
        <button class="time-btn" onclick="setDuration(15)">15分钟</button>
        <button class="time-btn" onclick="setDuration(20)">20分钟</button>
        <button class="time-btn" onclick="setDuration(30)">30分钟</button>
      </div>
      <div class="action-btns">
        <button class="btn btn-secondary" id="startBtn" onclick="toggleTimer()">开始</button>
        <button class="btn btn-primary" onclick="finishEarly()">提前结束</button>
      </div>
      <!-- 确认区域 -->
      <div class="confirm-area" id="confirmArea">
        <p>练了 <strong id="confirmMins" class="confirm-mins">0</strong> 分钟！</p>
        <button class="btn btn-primary" onclick="submitPractice()">✅ 打卡完成</button>
      </div>
      <!-- 快速录入 -->
      <div class="quick-add-section" id="quickAddSection">
        <h4>⚡ 快速录入（不计时）</h4>
        <div class="quick-time-btns">
          <button class="quick-time-btn" onclick="setQuickDuration(5)">5分钟</button>
          <button class="quick-time-btn selected" onclick="setQuickDuration(10)">10分钟</button>
          <button class="quick-time-btn" onclick="setQuickDuration(15)">15分钟</button>
          <button class="quick-time-btn" onclick="setQuickDuration(20)">20分钟</button>
          <button class="quick-time-btn" onclick="setQuickDuration(30)">30分钟</button>
        </div>
        <div class="quick-add-actions">
          <button class="start-btn" onclick="submitQuickLog()">✅ 直接打卡</button>
          <button class="btn-cancel" onclick="toggleQuickAdd()">取消</button>
        </div>
      </div>
    </div>

    <!-- 右栏：额外练习时间 -->
    <div class="panel panel-extra" id="extraSection">
      <h4>🌿 额外练习时间</h4>
      <div class="extra-btns">
        <button class="extra-btn" onclick="addExtraMins(5)">+5</button>
        <button class="extra-btn" onclick="addExtraMins(10)">+10</button>
        <button class="extra-btn" onclick="addExtraMins(15)">+15</button>
        <button class="extra-btn" onclick="addExtraMins(20)">+20</button>
        <button class="extra-btn" onclick="addExtraMins(30)">+30</button>
      </div>
      <div class="extra-custom">
        <input type="number" id="extraCustomMins" min="1" max="480" value="10"
          style="width:64px;padding:8px 10px;border:2px solid #7CB87C;border-radius:16px;font-size:15px;text-align:center;font-family:inherit;">
        <button class="extra-btn" onclick="addExtraFromInput()">添加</button>
      </div>
      <div id="extraLogList"></div>
    </div>

  </div>

  <!-- 今日练习记录 -->
  <div class="card today-records">
    <h3>📋 今日练习记录</h3>
    <div id="recordsList"></div>
  </div>

  <script>
    // Short completion chime
    function playChime() {
      try {
        new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2teleQYMTYq9n6p7IQQ5jcOyp5mMZEA3YK3b4LyDeEBpp9XjtnVJUJLU4s2zak1ToNXm4qd2UFmn1eXeqHFWYqrc5cClcF5sreDnw5B0YW2s4OPGj3hmcLDl5cB/dGVysujnxH13aHS07enGf3dqdrTu6sR6eGx4tO/qw3l9b3q18OnBdn9xe7bx6sB4gHF9ufLqwHWAdn+69OvAdoF3gL316r53gnmCefTrvneDeoN69e28d4N7g3n17rx3hHyEevXuuneFfIV79u67d4Z9hXv27rt3h3yGfPbuuneHfod99u67d4h+h3z27rt3iH+Hffbuu3eIf4d99u67d4hA').play();
      } catch(e) {}
    }

    // Fire confetti
    function fireConfetti() {
      try {
        const duration = 3000;
        const end = Date.now() + duration;
        const colors = ['#FF6B6B','#4ECDC4','#FFE066','#FF8CC8','#6BCB77'];
        (function frame() {
          confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors });
          confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors });
          if (Date.now() < end) requestAnimationFrame(frame);
        }());
        confetti({ particleCount: 100, spread: 100, origin: { y: 0.6 }, colors });
      } catch(e) {}
    }

    // ── 老师要求数据 ──
    const WEEKLY_ASSIGN = {{assign_json}};

    // Filter practice items by search query
    function filterItems(q) {
      q = q.trim().toLowerCase();
      document.querySelectorAll('.item-btn').forEach(btn => {
        btn.style.display = (q === '' || btn.textContent.toLowerCase().includes(q)) ? '' : 'none';
      });
      document.querySelectorAll('.item-grid').forEach(grid => {
        const hasVisible = Array.from(grid.querySelectorAll('.item-btn')).some(b => b.style.display !== 'none');
        const prev = grid.previousElementSibling;
        if (prev && prev.tagName === 'H3') {
          prev.style.display = hasVisible ? '' : 'none';
        }
      });
    }

    let selectedItem = null;
    let selectedItemId = null;
    let duration = 10;
    let elapsed = 0;
    let timerInterval = null;
    let started = false;
    let timerRunning = false;
    let quickDuration = 10;
    let todayDate = "{{today_date}}";
    let enterTime = new Date().toISOString();  // 行为日志：进入时间

    // ── 实时时钟 ──
    function updateClock() {
      const now = new Date();
      const y = now.getFullYear();
      const mo = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      const h = String(now.getHours()).padStart(2, '0');
      const mi = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      const pad = document.getElementById('serverClock');
      if (pad) { pad.textContent = `${y}-${mo}-${d} ${h}:${mi}:${s}`; }
    }
    setInterval(updateClock, 1000);
    updateClock();
    let pendingNav = null;

    // ── 老科目加载 ──
    let archivedLoaded = false;
    async function loadArchivedToggle() {
      try {
        let res = await fetch('/api/items?include_archived=false');
        let data = await res.json();
        let res2 = await fetch('/api/items?include_archived=true');
        let data2 = await res2.json();
        let total = data2.items.length;
        let active = data.items.length;
        if (total > active) {
          document.getElementById('archivedToggleWrap').innerHTML =
            '<button class="archived-toggle" onclick="toggleArchived()">📁 老科目 (' + (total - active) + ')</button>';
        }
      } catch(e) {}
    }
    async function toggleArchived() {
      let wrap = document.getElementById('archivedToggleWrap');
      let existing = document.querySelector('.archived-section');
      if (existing) { existing.classList.toggle('open'); return; }
      try {
        let res = await fetch('/api/items?include_archived=true');
        let data = await res.json();
        let archived = data.items.filter(i => i.is_archived);
        if (archived.length === 0) return;
        let html = '<div class="archived-section open"><h4>📁 老科目</h4>';
        html += '<div class="item-grid">';
        archived.forEach(it => {
          html += '<button class="archived-item-btn" onclick="selectArchivedItem(\'' + it.name.replace(/'/g, "\\'") + '\', ' + it.id + ', this)">' + it.name + '</button>';
        });
        html += '</div></div>';
        wrap.insertAdjacentHTML('beforeend', html);
      } catch(e) {}
    }

    // 更新左栏老师要求显示
    function updateReqPanel(reqText) {
      const tip = document.getElementById('reqTip');
      if (reqText) {
        tip.innerHTML = '<div class="req-label"></div><div class="req-highlight">' + reqText + '</div>';
      } else {
        tip.innerHTML = '<div class="req-empty">暂无老师要求<br>直接开始练习吧！</div>';
      }
    }

    function selectArchivedItem(name, id, btn) {
      document.querySelectorAll('.archived-item-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('selected'));
      selectedItem = name;
      selectedItemId = id;
      resetTimer();
      refreshExtraSection();

      const reqText = btn ? btn.getAttribute('data-req') : null;
      updateReqPanel(reqText || '');
    }

    // ── 计时器防跳出 ──
    function setupTimerProtect() {
      document.querySelectorAll('.nav a').forEach(a => {
        a.addEventListener('click', e => {
          if (!timerRunning) return;
          const href = a.getAttribute('href');
          if (!href || href === window.location.pathname) return;
          e.preventDefault();
          pendingNav = href;
          document.getElementById('timerProtectModal').classList.add('open');
        });
      });
      window.addEventListener('beforeunload', e => {
        if (timerRunning) { e.preventDefault(); e.returnValue = ''; }
      });
      document.addEventListener('visibilitychange', () => {
        if (document.hidden && timerRunning) { pendingNav = null; }
      });
    }
    function closeTimerProtect() {
      document.getElementById('timerProtectModal').classList.remove('open');
      pendingNav = null;
    }
    function confirmLeave() {
      timerRunning = false;
      clearInterval(timerInterval);
      started = false;
      document.getElementById('timerProtectModal').classList.remove('open');
      if (pendingNav) window.location.href = pendingNav;
    }

    // ── 快速录入 ──
    function toggleQuickAdd() {
      document.getElementById('quickAddSection').classList.toggle('open');
    }
    function setQuickDuration(mins) {
      quickDuration = mins;
      document.querySelectorAll('.quick-time-btn').forEach(b => b.classList.remove('selected'));
      event.target.classList.add('selected');
    }
    async function submitQuickLog() {
      if (!selectedItem) { alert('请先选择一个科目'); return; }
      let res = await fetch('/api/log', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({date: todayDate, item: selectedItem, minutes: quickDuration, log: '', behavior_log: [{enter_time: enterTime, item: selectedItem, minutes: quickDuration}]})
      });
      let json = await res.json();
      if (json.ok) {
        fireConfetti();
        document.querySelector('#confirmArea p').innerHTML = '⚡ 快速打卡 +' + quickDuration + '分钟！';
        document.getElementById('confirmArea').classList.add('show');
        gsap.fromTo('#confirmArea', { scale: 0.5, opacity: 0, y: 30 }, { scale: 1, opacity: 1, y: 0, duration: 0.6, ease: "back.out(2)" });
        document.getElementById('quickAddSection').classList.remove('open');
        setTimeout(() => {
          document.getElementById('confirmArea').classList.remove('show');
          document.querySelectorAll('.item-btn, .archived-item-btn').forEach(b => b.classList.remove('selected'));
          selectedItem = null;
          loadTodayRecords();
        }, 2000);
      }
    }

    // ── 计时器主逻辑 ──
    function selectItem(name, id) {
      document.querySelectorAll('.archived-item-btn').forEach(b => b.classList.remove('selected'));
      document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('selected'));
      const btn = document.querySelector(`.item-btn[data-id='${id}'], .archived-item-btn[data-id='${id}']`);
      if (btn) btn.classList.add('selected');
      selectedItem = name;
      selectedItemId = id;
      resetTimer();
      refreshExtraSection();

      const reqText = btn ? btn.getAttribute('data-req') : null;
      updateReqPanel(reqText || '');
      document.getElementById('timer-layout').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function setDuration(mins) {
      duration = mins;
      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
      event.target.classList.add('selected');
      if (!started) resetTimer();
    }

    function resetTimer() {
      clearInterval(timerInterval);
      started = false;
      timerRunning = false;
      elapsed = 0;
      document.getElementById('timer-display').textContent = '00:00';
      document.getElementById('startBtn').textContent = '开始';
      document.getElementById('confirmArea').classList.remove('show');
      document.getElementById('quickAddSection').classList.remove('open');
    }

    function toggleTimer() {
      if (started) {
        clearInterval(timerInterval);
        started = false;
        timerRunning = false;
        document.getElementById('startBtn').textContent = '继续';
      } else {
        started = true;
        timerRunning = true;
        document.getElementById('startBtn').textContent = '暂停';
        document.getElementById('timer-display').classList.add('running');
        timerInterval = setInterval(() => {
          elapsed++;
          let m = Math.floor(elapsed / 60).toString().padStart(2,'0');
          let s = (elapsed % 60).toString().padStart(2,'0');
          document.getElementById('timer-display').textContent = m + ':' + s;
          if (elapsed >= duration * 60) {
            clearInterval(timerInterval);
            timerRunning = false;
            started = false;
            document.getElementById('timer-display').classList.remove('running');
            document.getElementById('confirmMins').textContent = duration;
            document.getElementById('confirmArea').classList.add('show');
            document.getElementById('startBtn').textContent = '开始';
            playChime();
          }
        }, 1000);
      }
    }

    function finishEarly() {
      clearInterval(timerInterval);
      started = false;
      timerRunning = false;
      const finalMins = Math.floor(elapsed / 60);
      elapsed = 0;
      document.getElementById('timer-display').textContent = '00:00';
      document.getElementById('timer-display').classList.remove('running');
      document.getElementById('confirmMins').textContent = finalMins;
      document.getElementById('confirmArea').classList.add('show');
      document.getElementById('startBtn').textContent = '开始';
    }

    async function submitPractice() {
      let finalMins = parseInt(document.getElementById('confirmMins').textContent) || 0;
      if (!selectedItem || finalMins === 0) return;
      let res = await fetch('/api/log', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({date: todayDate, item: selectedItem, minutes: finalMins, log: '', behavior_log: [{enter_time: enterTime, item: selectedItem, minutes: finalMins}]})
      });
      let json = await res.json();
      if (json.ok) {
        timerRunning = false;
        fireConfetti();
        document.querySelector('#confirmArea p').innerHTML = '🎉 打卡成功！太棒啦！';
        document.getElementById('confirmArea').classList.add('show');
        gsap.fromTo('#confirmArea', { scale: 0.5, opacity: 0, y: 30 }, { scale: 1, opacity: 1, y: 0, duration: 0.6, ease: "back.out(2)" });
        loadTodayRecords();
        setTimeout(() => {
          resetTimer();
          document.querySelectorAll('.item-btn, .archived-item-btn').forEach(b => b.classList.remove('selected'));
          selectedItem = null;
          document.getElementById('confirmArea').classList.remove('show');
          updateReqPanel('');
        }, 2500);
      }
    }

    // ── 额外练习时间 ──
    async function refreshExtraSection() {
      try {
        let res = await fetch('/api/practices/' + todayDate);
        let data = await res.json();
        let logList = document.getElementById('extraLogList');
        let extras = (data.items || []).filter(it => it.is_extra);
        if (extras.length === 0) {
          logList.innerHTML = '<div style="font-size:13px;color:#A5D6A7;text-align:center;padding:6px;">暂无额外记录</div>';
        } else {
          logList.innerHTML = extras.map(it => `
            <div class="extra-log-item">
              <span>${it.item}</span>
              <span class="extra-mins">+${it.minutes}分钟</span>
              <button class="extra-del" onclick="deleteExtraRecord('${it.item_id}')">✕</button>
            </div>
          `).join('');
        }
      } catch(e) {}
    }

    async function addExtraMins(mins) {
      if (!selectedItem) { alert('请先选择一个科目'); return; }
      try {
        let res = await fetch('/api/log', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({date: todayDate, item: selectedItem, minutes: mins, log: '', is_extra: true, behavior_log: [{enter_time: enterTime, item: selectedItem, minutes: mins}]})
        });
        let json = await res.json();
        if (json.ok) {
          fireConfetti();
          refreshExtraSection();
          loadTodayRecords();
        }
      } catch(e) {}
    }

    async function addExtraFromInput() {
      let input = document.getElementById('extraCustomMins');
      let mins = parseInt(input.value);
      if (!mins || mins < 1 || mins > 480) { alert('请输入1-480之间的分钟数'); return; }
      await addExtraMins(mins);
      input.value = '';
    }

    async function deleteExtraRecord(id) {
      if (!confirm('确定要删除这条额外练习记录吗？')) return;
      try {
        let res = await fetch('/api/log', {
          method: 'DELETE',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({date: todayDate, id: id})
        });
        let result = await res.json();
        if (result.ok) {
          refreshExtraSection();
          renderTodayRecords(result.items || [], result.total_minutes || 0);
        } else {
          alert('删除失败: ' + (result.error || '未知错误'));
        }
      } catch(e) { console.error(e); }
    }

    // Load today's records from API
    function renderTodayRecords(items, total) {
      let recordsList = document.getElementById('recordsList');
      if (!items || items.length === 0) {
        recordsList.innerHTML = '<div class="empty-records">还没有练习记录，开始练习吧！</div>';
      } else {
        recordsList.innerHTML = items.map(it => `
          <div class="record-item">
            <div>
              <div class="item-name">${it.item}</div>
              <div class="item-mins">${it.minutes} 分钟</div>
            </div>
            <button class="delete-btn" onclick="deleteRecord(${it.item_id})">✕</button>
          </div>
        `).join('');
        gsap.fromTo('.record-item', { opacity: 0, x: 60 }, { opacity: 1, x: 0, duration: 0.45, stagger: 0.1, ease: "power3.out" });
      }
      document.querySelector('.today-stat').textContent = '今日已练习: ' + total + ' 分钟';
    }

    async function loadTodayRecords() {
      try {
        let res = await fetch('/api/practices/' + todayDate);
        let data = await res.json();
        renderTodayRecords(data.items || [], data.total_minutes || 0);
      } catch(e) {
        document.getElementById('recordsList').innerHTML = '<div class="empty-records">加载失败: ' + e.message + '</div>';
      }
    }

    async function deleteRecord(id) {
      if (!confirm('确定要删除这条练习记录吗？')) return;
      try {
        let res = await fetch('/api/log', {
          method: 'DELETE',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({date: todayDate, id: id})
        });
        let result = await res.json();
        if (result.ok) {
          renderTodayRecords(result.items || [], result.total_minutes || 0);
        } else {
          alert('删除失败: ' + (result.error || '未知错误'));
        }
      } catch(e) { console.error(e); }
    }

    // Init
    loadTodayRecords();
    loadArchivedToggle();
    setupTimerProtect();

    // ── 页面加载整体弹入动画 ──
    const allCards = document.querySelectorAll('.card, .panel');
    gsap.fromTo(allCards, { opacity: 0, scale: 0.88, y: 24 }, { opacity: 1, scale: 1, y: 0, duration: 0.6, stagger: 0.1, ease: "back.out(2)" });
  </script>
</body>
</html>
