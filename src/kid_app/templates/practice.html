<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>练习打卡 - 竹笛助手</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body { padding-bottom: 80px; }

    /* 固定底部导航 */
    .nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      gap: 4px;
      margin-bottom: 0;
      padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
      background: var(--card);
      box-shadow: 0 -2px 12px rgba(0,0,0,0.1);
      z-index: 100;
      flex-wrap: nowrap;
    }
    .nav a {
      flex: 1;
      min-width: 0;
      padding: 8px 4px;
      background: transparent;
      border-radius: var(--radius);
      text-align: center;
      text-decoration: none;
      color: var(--text-light);
      font-size: 12px;
      box-shadow: none;
      transition: transform 0.1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .nav a .nav-icon { font-size: 20px; }
    .nav a:active { transform: scale(0.95); }
    .nav a.active { background: var(--primary); color: white; }

    /* 计时器大字体 */
    .timer-big { font-size: 72px; font-weight: bold; text-align: center; color: #FF6B6B; padding: 20px 0; }
    .time-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 16px; }
    .time-btn { padding: 10px 16px; border: 2px solid #4ECDC4; background: white; border-radius: 20px; font-size: 16px; cursor: pointer; }
    .time-btn.selected { background: #4ECDC4; color: white; }
    /* ── 活力色块：练习科目按钮 ── */
    .item-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 12px 0;
    }
    .item-btn {
      width: 100%;
      min-width: 0;
      height: 56px;
      border: none;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: transform 0.2s ease, filter 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    .item-btn:active { transform: scale(0.96); filter: brightness(0.92); }

    /* 默认色块：循环 5 色 */
    .item-btn:nth-child(5n+1) { background: #00CED1; }   /* 深青 */
    .item-btn:nth-child(5n+2) { background: #FF6B9D; }   /* 粉红 */
    .item-btn:nth-child(5n+3) { background: #A855F7; }   /* 紫色 */
    .item-btn:nth-child(5n+4) { background: #FF9F1C; }   /* 橙黄 */
    .item-btn:nth-child(5n+5) { background: #10B981; }   /* 翠绿 */

    /* 选中 */
    .item-btn.selected {
      background: #FF4D6D !important;
      box-shadow: 0 4px 0 #C41E3A;
      transform: translateY(-2px);
    }
    .item-btn.selected:active { transform: scale(0.96) translateY(0); box-shadow: none; }

    /* 老师要求高亮 */
    .item-btn.has-req {
      background: #FFE066 !important;
      color: #5D4037;
      box-shadow: 0 4px 0 #E6A800;
      transform: translateY(-2px);
      animation: req-glow 2s ease-in-out infinite;
    }
    .item-btn.has-req.selected {
      background: #FF4D6D !important;
      color: white;
      box-shadow: 0 4px 0 #C41E3A;
      transform: translateY(-2px);
      animation: none;
    }
    .item-btn.has-req.selected:active { transform: scale(0.96) translateY(0); box-shadow: none; }
    @keyframes req-glow {
      0%, 100% { box-shadow: 0 4px 0 #E6A800, 0 0 0 0 rgba(255,224,102,0.4); }
      50%       { box-shadow: 0 4px 0 #E6A800, 0 0 0 8px rgba(255,224,102,0); }
    }

    /* 浮动气泡 */
    .req-tooltip {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #FFE066;
      color: #333;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 8px;
      white-space: nowrap;
      max-width: 180px;
      white-space: normal;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      z-index: 10;
      pointer-events: none;
    }
    .req-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: #FFE066;
    }
    .item-btn-wrap { position: relative; display: inline-block; }
    .item-btn-wrap .req-tooltip { opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .item-btn-wrap:hover .req-tooltip { opacity: 1; }

    /* 老师要求提示卡 */
    #reqTip {
      display: none;
      background: linear-gradient(135deg, #FFF9C4, #FFE082);
      border: 2px solid #FFD54F;
      border-radius: 12px;
      padding: 12px 36px 12px 14px;
      margin: 10px auto 14px;
      font-size: 14px;
      color: #5D4037;
      position: relative;
      max-width: 320px;
    }
    #reqTip.show { display: block; }
    #reqTip::before {
      content: '🎯 老师要求';
      display: block;
      font-weight: bold;
      font-size: 13px;
      color: #E65100;
      margin-bottom: 6px;
    }
    .close-tip {
      position: absolute;
      top: 8px;
      right: 10px;
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      color: #BDBDBD;
      line-height: 1;
    }

    /* 打卡按钮 */
    .start-btn { display: block; width: 100%; padding: 18px; background: #FF6B6B; color: white; border: none; border-radius: 20px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 16px; }
    .today-stat { text-align: center; color: #7F8C8D; font-size: 16px; margin-top: 8px; }
    .confirm-area { display: none; text-align: center; margin-top: 20px; }
    .confirm-area.show { display: block; }
    .today-records { margin-top: 20px; }
    .today-records h3 { font-size: 18px; color: #4ECDC4; margin-bottom: 10px; }
    .record-item { display: flex; align-items: center; justify-content: space-between; background: #FFF; border: 2px solid #E0E0E0; border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; }
    .record-item .item-name { font-size: 16px; font-weight: bold; color: #333; }
    .record-item .item-mins { font-size: 14px; color: #7F8C8D; margin-top: 2px; }
    .record-item .delete-btn { background: #FF6B6B; color: white; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 18px; cursor: pointer; flex-shrink: 0; line-height: 32px; text-align: center; }
    .record-item .delete-btn:active { background: #e55a5a; }
    .empty-records { text-align: center; color: #BDBDBD; font-size: 14px; padding: 12px; }

    /* 老科目折叠 */
    .archived-toggle {
      display: block; width: 100%; padding: 12px; background: #F5F5F5;
      border: 2px dashed #BDBDBD; border-radius: 12px; font-size: 15px;
      color: #7F8C8D; cursor: pointer; text-align: center; margin-top: 8px;
    }
    .archived-toggle:active { background: #EBEBEB; }
    .archived-section { display: none; margin-top: 12px; }
    .archived-section.open { display: block; }
    .archived-section h4 { font-size: 14px; color: #BDBDBD; margin-bottom: 8px; text-align: center; }
    .archived-item-btn {
      padding: 10px 8px; background: #E0E0E0; color: #7F8C8D; border: none;
      border-radius: 10px; font-size: 14px; cursor: pointer; text-align: center; text-decoration: line-through;
    }
    .archived-item-btn.selected { background: #FF6B6B; color: white; }

    /* 快速录入 */
    .quick-add-section {
      display: none; background: #FFF8E1; border: 2px solid #FFE066;
      border-radius: 12px; padding: 16px; margin-top: 12px;
    }
    .quick-add-section.open { display: block; }
    .quick-add-section h4 { font-size: 15px; color: #E6A800; margin-bottom: 10px; text-align: center; }
    .quick-time-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
    .quick-time-btn { padding: 8px 14px; border: 2px solid #FFE066; background: white; border-radius: 16px; font-size: 15px; cursor: pointer; }
    .quick-time-btn.selected { background: #FFE066; color: #333; }
    .quick-add-actions { display: flex; gap: 8px; justify-content: center; }

    /* 额外练习时间 */
    .extra-section {
      display: none; background: linear-gradient(135deg, #E8F5E9, #C8E6C9);
      border: 2px solid #66BB6A; border-radius: 12px; padding: 16px; margin-top: 12px;
    }
    .extra-section.open { display: block; }
    .extra-section h4 { font-size: 15px; color: #2E7D32; margin-bottom: 10px; text-align: center; }
    .extra-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
    .extra-btn {
      padding: 8px 14px; border: 2px solid #66BB6A; background: white;
      border-radius: 16px; font-size: 15px; cursor: pointer; color: #333;
    }
    .extra-btn.selected { background: #66BB6A; color: white; }
    .extra-log-item {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(255,255,255,0.7); border: 1px solid #A5D6A7;
      border-radius: 8px; padding: 8px 12px; margin-top: 8px; font-size: 14px;
    }
    .extra-log-item .extra-mins { color: #2E7D32; font-weight: bold; }
    .extra-log-item .extra-del {
      background: #FF6B6B; color: white; border: none; border-radius: 50%;
      width: 24px; height: 24px; font-size: 12px; cursor: pointer; flex-shrink: 0;
    }

    /* 计时器保护弹窗 */
    #timerProtectModal {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 200; align-items: center; justify-content: center; padding: 20px;
    }
    #timerProtectModal.open { display: flex; }
    .modal-box {
      background: white; border-radius: 20px; padding: 28px 24px;
      max-width: 320px; width: 100%; text-align: center;
    }
    .modal-box h3 { font-size: 20px; color: #FF6B6B; margin-bottom: 12px; }
    .modal-box p { font-size: 16px; color: #555; margin-bottom: 20px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 10px; flex-direction: column; }
    .modal-actions button { padding: 14px; border: none; border-radius: 16px; font-size: 17px; font-weight: bold; cursor: pointer; }
    .modal-actions .btn-stay { background: #4ECDC4; color: white; }
    .modal-actions .btn-leave { background: #FF6B6B; color: white; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/prepare" class="nav-item"><span class="nav-icon">🏠</span><span>准备</span></a>
    <a href="/practice" class="nav-item active"><span class="nav-icon">🎵</span><span>练习</span></a>
    <a href="/achievements" class="nav-item"><span class="nav-icon">🏆</span><span>成就</span></a>
    <a href="/report" class="nav-item"><span class="nav-icon">📊</span><span>报告</span></a>
    <a href="/praise" class="nav-item"><span class="nav-icon">⭐</span><span>表扬</span></a>
  </div>

  <!-- 计时器保护弹窗 -->
  <div id="timerProtectModal">
    <div class="modal-box">
      <h3>⏱️ 计时器还在跑</h3>
      <p>离开这个页面的话，计时会取消哦！</p>
      <div class="modal-actions">
        <button class="btn-stay" onclick="closeTimerProtect()">继续练习</button>
        <button class="btn-leave" onclick="confirmLeave()">确认离开</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2 style="color:#FF6B6B;">🎵 选择练习项目</h2>
    <input type="text" id="itemFilter" placeholder="🔍 搜索..." style="width:100%;padding:12px;border-radius:12px;border:2px solid #E0E0E0;font-size:16px;margin-bottom:12px;" oninput="filterItems(this.value)">
    {{items_html}}
    <div id="archivedToggleWrap"></div>
    <div class="today-stat">今日已练习: {{today_mins}} 分钟</div>
  </div>

  <div class="card" id="timer-card" style="display:none;">
    <h2 style="color:#4ECDC4;">⏱️ 计时器</h2>
    <div class="timer-big" id="timer-display">00:00</div>
    <div class="time-btns">
      <button class="time-btn" onclick="setDuration(5)">5分钟</button>
      <button class="time-btn selected" onclick="setDuration(10)">10分钟</button>
      <button class="time-btn" onclick="setDuration(15)">15分钟</button>
      <button class="time-btn" onclick="setDuration(20)">20分钟</button>
      <button class="time-btn" onclick="setDuration(30)">30分钟</button>
    </div>
    <!-- 老师要求提示（选中科目后显示） -->
    <div id="reqTip">
      <button class="close-tip" onclick="closeReqTip()">✕</button>
      <div id="reqTipContent"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;">
      <button class="btn btn-secondary" id="startBtn" onclick="toggleTimer()">开始</button>
      <button class="btn btn-primary" onclick="finishEarly()">提前结束</button>
    </div>
    <!-- 快速录入模块 -->
    <div class="quick-add-section" id="quickAddSection">
      <h4>⚡ 快速录入（不计时）</h4>
      <div class="quick-time-btns">
        <button class="quick-time-btn" onclick="setQuickDuration(5)">5分钟</button>
        <button class="quick-time-btn selected" onclick="setQuickDuration(10)">10分钟</button>
        <button class="quick-time-btn" onclick="setQuickDuration(15)">15分钟</button>
        <button class="quick-time-btn" onclick="setQuickDuration(20)">20分钟</button>
        <button class="quick-time-btn" onclick="setQuickDuration(30)">30分钟</button>
      </div>
      <div class="quick-add-actions">
        <button class="start-btn" style="margin:0;background:#FFE066;color:#333;" onclick="submitQuickLog()">✅ 直接打卡</button>
        <button style="background:none;border:2px solid #E0E0E0;color:#7F8C8D;padding:10px;border-radius:16px;font-size:15px;cursor:pointer;" onclick="toggleQuickAdd()">取消</button>
      </div>
    </div>
    <!-- 额外练习时间模块 -->
    <div class="extra-section" id="extraSection">
      <h4>🌿 额外练习时间</h4>
      <div class="extra-btns">
        <button class="extra-btn" onclick="addExtraMins(5)">+5分钟</button>
        <button class="extra-btn selected" onclick="addExtraMins(10)">+10分钟</button>
        <button class="extra-btn" onclick="addExtraMins(15)">+15分钟</button>
        <button class="extra-btn" onclick="addExtraMins(20)">+20分钟</button>
        <button class="extra-btn" onclick="addExtraMins(30)">+30分钟</button>
      </div>
      <div id="extraLogList"></div>
    </div>
    <div class="confirm-area" id="confirmArea">
      <p style="font-size:20px;margin-bottom:12px;">练了 <strong id="confirmMins">0</strong> 分钟！</p>
      <button class="start-btn" onclick="submitPractice()">✅ 打卡完成</button>
    </div>
  </div>

  <div class="card today-records" id="todayRecords">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px;">
      <h3>📋 今日练习记录</h3>
      <div id="serverClock" style="font-size:13px;color:#7F8C8D;background:#F8F9FA;border-radius:12px;padding:4px 12px;flex:1;text-align:right;"></div>
    </div>
    <div id="recordsList"></div>
  </div>

  <script>
    // Short completion chime
    function playChime() {
      try {
        new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2teleQYMTYq9n6p7IQQ5jcOyp5mMZEA3YK3b4LyDeEBpp9XjtnVJUJLU4s2zak1ToNXm4qd2UFmn1eXeqHFWYqrc5cClcF5sreDnw5B0YW2s4OPGj3hmcLDl5cB/dGVysujnxH13aHS07enGf3dqdrTu6sR6eGx4tO/qw3l9b3q18OnBdn9xe7bx6sB4gHF9ufLqwHWAdn+69OvAdoF3gL316r53gnmCefTrvneDeoN69e28d4N7g3n17rx3hHyEevXuuneFfIV79u67d4Z9hXv27rt3h3yGfPbuuneHfod99u67d4h+h3z27rt3iH+Hffbuu3eIf4d99u67d4hA').play();
      } catch(e) {}
    }

    // Fire confetti
    function fireConfetti() {
      try {
        const duration = 3000;
        const end = Date.now() + duration;
        const colors = ['#FF6B6B','#4ECDC4','#FFE066','#FF8CC8','#6BCB77'];
        (function frame() {
          confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, colors });
          confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, colors });
          if (Date.now() < end) requestAnimationFrame(frame);
        }());
        // Big center burst
        confetti({ particleCount: 100, spread: 100, origin: { y: 0.6 }, colors });
      } catch(e) {}
    }

    // ── 老师要求数据 ──
    const WEEKLY_ASSIGN = {{assign_json}};

    // Filter practice items by search query
    function filterItems(q) {
      q = q.trim().toLowerCase();
      document.querySelectorAll('.item-btn').forEach(btn => {
        btn.style.display = (q === '' || btn.textContent.toLowerCase().includes(q)) ? '' : 'none';
      });
      document.querySelectorAll('.item-grid').forEach(grid => {
        const hasVisible = Array.from(grid.querySelectorAll('.item-btn')).some(b => b.style.display !== 'none');
        const prev = grid.previousElementSibling;
        if (prev && prev.tagName === 'H3') {
          prev.style.display = hasVisible ? '' : 'none';
        }
      });
    }

    let selectedItem = null;
    let selectedItemId = null;
    let duration = 10;
    let elapsed = 0;
    let timerInterval = null;
    let started = false;
    let timerRunning = false;
    let quickDuration = 10;
    let todayDate = "{{today_date}}";

    // ── 实时时钟 ──
    function updateClock() {
      const now = new Date();
      const y = now.getFullYear();
      const mo = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      const h = String(now.getHours()).padStart(2, '0');
      const mi = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      const pad = document.getElementById('serverClock');
      if (pad) {
        pad.textContent = `${y}-${mo}-${d} ${h}:${mi}:${s}`;
      }
    }
    setInterval(updateClock, 1000);
    updateClock();
    let pendingNav = null;

    // ── 老科目加载 ──
    let archivedLoaded = false;
    async function loadArchivedToggle() {
      // Fetch count of archived items
      try {
        let res = await fetch('/api/items?include_archived=false');
        let data = await res.json();
        let res2 = await fetch('/api/items?include_archived=true');
        let data2 = await res2.json();
        let total = data2.items.length;
        let active = data.items.length;
        if (total > active) {
          document.getElementById('archivedToggleWrap').innerHTML =
            '<button class="archived-toggle" onclick="toggleArchived()">📁 老科目 (' + (total - active) + ')</button>';
        }
      } catch(e) {}
    }
    async function toggleArchived() {
      let wrap = document.getElementById('archivedToggleWrap');
      let existing = document.querySelector('.archived-section');
      if (existing) {
        existing.classList.toggle('open');
        return;
      }
      try {
        let res = await fetch('/api/items?include_archived=true');
        let data = await res.json();
        let archived = data.items.filter(i => i.is_archived);
        if (archived.length === 0) return;
        let html = '<div class="archived-section open"><h4>📁 老科目（不显示在列表里了）</h4>';
        html += '<div class="item-grid">';
        archived.forEach(it => {
          html += '<button class="archived-item-btn" onclick="selectArchivedItem(\'' + it.name.replace(/'/g, "\\'") + '\', ' + it.id + ', this)">' + it.name + '</button>';
        });
        html += '</div></div>';
        wrap.insertAdjacentHTML('beforeend', html);
      } catch(e) {}
    }
    function selectArchivedItem(name, id, btn) {
      document.querySelectorAll('.archived-item-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('selected'));
      selectedItem = name;
      selectedItemId = id;
      document.getElementById('timer-card').style.display = 'block';
      document.getElementById('timer-card').scrollIntoView({behavior: 'smooth'});
      resetTimer();
      refreshExtraSection();

      // 检查老师要求
      const tip = document.getElementById('reqTip');
      const tipContent = document.getElementById('reqTipContent');
      let reqText = '';
      if (WEEKLY_ASSIGN && WEEKLY_ASSIGN.items) {
        for (const a of WEEKLY_ASSIGN.items) {
          if (a.item === name) { reqText = a.requirement || ''; break; }
        }
      }
      if (reqText) {
        tipContent.textContent = reqText;
        tip.classList.add('show');
        gsap.fromTo('#reqTip',
          { opacity: 0, scale: 0.8, y: -10 },
          { opacity: 1, scale: 1, y: 0, duration: 0.45, ease: "back.out(2)" }
        );
      } else {
        tip.classList.remove('show');
      }
    }

    function closeReqTip() {
      const tip = document.getElementById('reqTip');
      tip.classList.remove('show');
    }

    // ── 计时器防跳出 ──
    function setupTimerProtect() {
      // 导航栏点击拦截
      document.querySelectorAll('.nav a').forEach(a => {
        a.addEventListener('click', e => {
          if (!timerRunning) return;
          const href = a.getAttribute('href');
          if (!href || href === window.location.pathname) return;
          e.preventDefault();
          pendingNav = href;
          document.getElementById('timerProtectModal').classList.add('open');
        });
      });
      // beforeunload
      window.addEventListener('beforeunload', e => {
        if (timerRunning) {
          e.preventDefault();
          e.returnValue = '';
        }
      });
      // visibilitychange
      document.addEventListener('visibilitychange', () => {
        if (document.hidden && timerRunning) {
          pendingNav = null; // don't navigate away
        }
      });
    }
    function closeTimerProtect() {
      document.getElementById('timerProtectModal').classList.remove('open');
      pendingNav = null;
    }
    function confirmLeave() {
      timerRunning = false;
      clearInterval(timerInterval);
      started = false;
      document.getElementById('timerProtectModal').classList.remove('open');
      if (pendingNav) window.location.href = pendingNav;
    }

    // ── 快速录入 ──
    function toggleQuickAdd() {
      document.getElementById('quickAddSection').classList.toggle('open');
    }
    function setQuickDuration(mins) {
      quickDuration = mins;
      document.querySelectorAll('.quick-time-btn').forEach(b => b.classList.remove('selected'));
      event.target.classList.add('selected');
    }
    async function submitQuickLog() {
      if (!selectedItem) { alert('请先选择一个科目'); return; }
      let res = await fetch('/api/log', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({date: todayDate, item: selectedItem, minutes: quickDuration, log: ''})
      });
      let json = await res.json();
      if (json.ok) {
        fireConfetti();
        document.querySelector('.confirm-area p').innerHTML = '⚡ 快速打卡 +' + quickDuration + '分钟！';
        document.getElementById('confirmArea').classList.add('show');
        gsap.fromTo('#confirmArea',
          { scale: 0.5, opacity: 0, y: 30 },
          { scale: 1, opacity: 1, y: 0, duration: 0.6, ease: "back.out(2)" }
        );
        document.getElementById('quickAddSection').classList.remove('open');
        setTimeout(() => {
          document.getElementById('confirmArea').classList.remove('show');
          document.getElementById('timer-card').style.display = 'none';
          document.querySelectorAll('.item-btn, .archived-item-btn').forEach(b => b.classList.remove('selected'));
          selectedItem = null;
          loadTodayRecords();
        }, 2000);
      }
    }

    // ── 计时器主逻辑 ──
    function selectItem(name, id) {
      // Clear archived selection
      document.querySelectorAll('.archived-item-btn').forEach(b => b.classList.remove('selected'));
      document.querySelectorAll('.item-btn').forEach(b => b.classList.remove('selected'));
      // Find the button that was clicked (supports both regular and archived items)
      const btn = document.querySelector(`.item-btn[data-id='${id}'], .archived-item-btn[data-id='${id}']`);
      if (btn) btn.classList.add('selected');
      selectedItem = name;
      selectedItemId = id;
      document.getElementById('timer-card').style.display = 'block';
      document.getElementById('timer-card').scrollIntoView({behavior: 'smooth'});
      resetTimer();
      refreshExtraSection();

      // 检查老师要求
      const tip = document.getElementById('reqTip');
      const tipContent = document.getElementById('reqTipContent');
      const reqText = btn ? btn.getAttribute('data-req') : null;
      if (reqText) {
        tipContent.textContent = reqText;
        tip.classList.add('show');
        gsap.fromTo('#reqTip',
          { opacity: 0, scale: 0.8, y: -10 },
          { opacity: 1, scale: 1, y: 0, duration: 0.45, ease: "back.out(2)" }
        );
      } else {
        tip.classList.remove('show');
      }
    }

    function setDuration(mins) {
      duration = mins;
      document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
      event.target.classList.add('selected');
      if (!started) resetTimer();
    }

    function resetTimer() {
      clearInterval(timerInterval);
      started = false;
      timerRunning = false;
      elapsed = 0;
      document.getElementById('timer-display').textContent = '00:00';
      document.getElementById('startBtn').textContent = '开始';
      document.getElementById('confirmArea').classList.remove('show');
      document.getElementById('quickAddSection').classList.remove('open');
      document.getElementById('reqTip').classList.remove('show');
    }

    function toggleTimer() {
      if (started) {
        clearInterval(timerInterval);
        started = false;
        timerRunning = false;
        document.getElementById('startBtn').textContent = '继续';
      } else {
        started = true;
        timerRunning = true;
        document.getElementById('startBtn').textContent = '暂停';
        timerInterval = setInterval(() => {
          elapsed++;
          let m = Math.floor(elapsed / 60).toString().padStart(2,'0');
          let s = (elapsed % 60).toString().padStart(2,'0');
          document.getElementById('timer-display').textContent = m + ':' + s;
          if (elapsed >= duration * 60) {
            clearInterval(timerInterval);
            timerRunning = false;
            document.getElementById('confirmMins').textContent = duration;
            document.getElementById('confirmArea').classList.add('show');
            playChime();
          }
        }, 1000);
      }
    }

    function finishEarly() {
      clearInterval(timerInterval);
      started = false;
      timerRunning = false;
      // 保存提前结束时的分钟数，然后立即重置 elapsed 防止带到下次
      const finalMins = Math.floor(elapsed / 60);
      elapsed = 0;
      document.getElementById('timer-display').textContent = '00:00';
      document.getElementById('confirmMins').textContent = finalMins;
      document.getElementById('confirmArea').classList.add('show');
    }

    async function submitPractice() {
      let finalMins = parseInt(document.getElementById('confirmMins').textContent) || 0;
      if (!selectedItem || finalMins === 0) return;
      let res = await fetch('/api/log', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({date: todayDate, item: selectedItem, minutes: finalMins, log: ''})
      });
      let json = await res.json();
      if (json.ok) {
        timerRunning = false;
        fireConfetti();
        document.querySelector('.confirm-area p').innerHTML = '🎉 打卡成功！太棒啦！';
        document.getElementById('confirmArea').classList.add('show');
        // GSAP bounce 进场动画
        gsap.fromTo('#confirmArea',
          { scale: 0.5, opacity: 0, y: 30 },
          { scale: 1, opacity: 1, y: 0, duration: 0.6, ease: "back.out(2)" }
        );
        // 立即刷新今日记录，不要等 2.5 秒
        loadTodayRecords();
        setTimeout(() => {
          resetTimer();
          document.querySelectorAll('.item-btn, .archived-item-btn').forEach(b => b.classList.remove('selected'));
          selectedItem = null;
          document.getElementById('timer-card').style.display = 'none';
        }, 2500);
      }
    }

    // ── 额外练习时间 ──
    async function refreshExtraSection() {
      try {
        let res = await fetch('/api/practices/' + todayDate);
        let data = await res.json();
        let logList = document.getElementById('extraLogList');
        let extras = (data.items || []).filter(it => it.is_extra);
        if (extras.length === 0) {
          logList.innerHTML = '';
        } else {
          logList.innerHTML = extras.map(it => `
            <div class="extra-log-item">
              <span>${it.item} <span style="font-size:11px;color:#AAA;">[#${it.item_id}]</span></span>
              <span class="extra-mins">+${it.minutes}分钟</span>
              <button class="extra-del" onclick="deleteExtraRecord('${it.item_id}')">✕</button>
            </div>
          `).join('');
        }
        // Toggle section visibility based on whether any item is selected
        const section = document.getElementById('extraSection');
        if (selectedItem) {
          section.classList.add('open');
        } else {
          section.classList.remove('open');
        }
      } catch(e) {}
    }

    async function addExtraMins(mins) {
      if (!selectedItem) { alert('请先选择一个科目'); return; }
      try {
        let res = await fetch('/api/log', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({date: todayDate, item: selectedItem, minutes: mins, log: '', is_extra: true})
        });
        let json = await res.json();
        if (json.ok) {
          fireConfetti();
          refreshExtraSection();
          loadTodayRecords();
        }
      } catch(e) {}
    }

    async function deleteExtraRecord(id) {
      console.log('[deleteExtraRecord] deleting id=' + id);
      try {
        let res = await fetch('/api/log', {
          method: 'DELETE',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({date: todayDate, id: id})
        });
        let result = await res.json();
        console.log('[deleteExtraRecord] result=' + JSON.stringify(result));
        if (result.ok) {
          refreshExtraSection();
          renderTodayRecords(result.items || [], result.total_minutes || 0);
        } else {
          alert('删除失败: ' + (result.error || '未知错误'));
        }
      } catch(e) {
        console.error('[deleteExtraRecord] error=' + e.message);
      }
    }

    // Load today's records from API
    function renderTodayRecords(items, total) {
      let recordsList = document.getElementById('recordsList');
      if (!items || items.length === 0) {
        recordsList.innerHTML = '<div class="empty-records">还没有练习记录，开始练习吧！</div>';
      } else {
        recordsList.innerHTML = items.map(it => `
          <div class="record-item">
            <div>
              <div class="item-name">${it.item} <span style="font-size:11px;color:#AAA;">[#${it.item_id}]</span></div>
              <div class="item-mins">${it.minutes} 分钟</div>
            </div>
            <button class="delete-btn" onclick="deleteRecord(${it.item_id})">✕</button>
          </div>
        `).join('');
        gsap.fromTo('.record-item',
          { opacity: 0, x: 60 },
          { opacity: 1, x: 0, duration: 0.45, stagger: 0.1, ease: "power3.out" }
        );
      }
      document.querySelector('.today-stat') && (document.querySelector('.today-stat').textContent = '今日已练习: ' + total + ' 分钟');
    }

    async function loadTodayRecords() {
      console.log('[loadTodayRecords] fetching /api/practices/' + todayDate);
      try {
        let res = await fetch('/api/practices/' + todayDate);
        console.log('[loadTodayRecords] status=' + res.status);
        let data = await res.json();
        console.log('[loadTodayRecords] data.items.length=' + (data.items ? data.items.length : 'null'));
        renderTodayRecords(data.items || [], data.total_minutes || 0);
      } catch(e) {
        console.error('[loadTodayRecords] error: ' + e.message);
        document.getElementById('recordsList').innerHTML = '<div class="empty-records">加载失败: ' + e.message + '</div>';
      }
    }

    async function deleteRecord(id) {
      console.log('[deleteRecord] called, id=' + id + ', todayDate=' + todayDate);
      try {
        let res = await fetch('/api/log', {
          method: 'DELETE',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({date: todayDate, id: id})
        });
        let result = await res.json();
        console.log('[deleteRecord] result=' + JSON.stringify(result));
        if (result.ok) {
          // 直接用服务端返回的数据更新 UI，避免 re-fetch 竞态
          renderTodayRecords(result.items || [], result.total_minutes || 0);
        } else {
          alert('删除失败: ' + (result.error || '未知错误'));
        }
      } catch(e) {
        console.error('[deleteRecord] error=' + e.message);
        alert('删除失败: ' + e.message);
      }
    }

    // Init
    loadTodayRecords();
    loadArchivedToggle();
    setupTimerProtect();

    // ── 页面加载整体弹入动画 ──
    const allCards = document.querySelectorAll('.card');
    gsap.fromTo(allCards,
      { opacity: 0, scale: 0.88, y: 24 },
      { opacity: 1, scale: 1, y: 0, duration: 0.6, stagger: 0.12, ease: "back.out(2)" }
    );
  </script>
</body>
</html>
