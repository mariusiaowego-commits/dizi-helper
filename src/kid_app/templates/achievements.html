<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>我的成就 - 竹笛助手</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body { padding-bottom: 80px; }
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; gap: 4px;
      padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
      background: var(--card, #fff); box-shadow: 0 -2px 12px rgba(0,0,0,0.1); z-index: 100;
    }
    .nav a {
      flex: 1; min-width: 0; padding: 8px 4px; background: transparent; border-radius: 16px;
      text-align: center; text-decoration: none; color: #7F8C8D; font-size: 12px;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .nav a:active { transform: scale(0.95); }
    .nav a.active { background: var(--primary, #FF6B6B); color: white; }
    .nav-icon { font-size: 20px; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/prepare" class="nav-item"><span class="nav-icon">🏠</span><span>准备</span></a>
    <a href="/practice" class="nav-item"><span class="nav-icon">🎵</span><span>练习</span></a>
    <a href="/achievements" class="nav-item active"><span class="nav-icon">🏆</span><span>成就</span></a>
    <a href="/report" class="nav-item"><span class="nav-icon">📊</span><span>报告</span></a>
    <a href="/praise" class="nav-item"><span class="nav-icon">⭐</span><span>表扬</span></a>
  </div>

  <div class="card" style="text-align:center;opacity:0;" id="streakCard">
    <div style="font-size:20px;color:#7F8C8D;margin-bottom:8px;">🔥 连续练习</div>
    <div class="streak-num">{{streak}}</div>
    <div style="font-size:20px;color:#7F8C8D;">天</div>
  </div>

  <div class="card">
    <h2>📊 练习数据</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div style="text-align:center;padding:16px;background:#E8F5E9;border-radius:12px;">
        <div style="font-size:36px;font-weight:bold;color:#27AE60;">{{total_hours}}</div>
        <div style="font-size:14px;color:#7F8C8D;">总练习小时</div>
      </div>
      <div style="text-align:center;padding:16px;background:#FFF8E1;border-radius:12px;">
        <div style="font-size:36px;font-weight:bold;color:#F57C00;">{{total_mins}}</div>
        <div style="font-size:14px;color:#7F8C8D;">总分钟(余)</div>
      </div>
      <div style="text-align:center;padding:16px;background:#E3F2FD;border-radius:12px;">
        <div style="font-size:36px;font-weight:bold;color:#1976D2;">{{week_mins}}</div>
        <div style="font-size:14px;color:#7F8C8D;">本周分钟</div>
      </div>
      <div style="text-align:center;padding:16px;background:#FCE4EC;border-radius:12px;">
        <div style="font-size:36px;font-weight:bold;color:#FF6B6B;">{{week_days}}</div>
        <div style="font-size:14px;color:#7F8C8D;">本周练习天</div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>🏆 成就徽章</h2>
    <div style="text-align:center;padding:16px 0;">
      {{badge_html}}
    </div>
    <p style="font-size:13px;color:#7F8C8D;text-align:center;margin-top:8px;">徽章根据累计练习达成，不限本周</p>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. 连续天数卡片整体弹入（比数字滚动先入场）
      const streakCard = document.getElementById('streakCard');
      gsap.fromTo(streakCard,
        { opacity: 0, scale: 0.7, y: 30 },
        { opacity: 1, scale: 1, y: 0, duration: 0.7, ease: "back.out(2.2)" }
      );

      // 数字滚动（独立于卡片入场）
      const streakEl = document.querySelector('.streak-num');
      const streakTarget = parseInt(streakEl.textContent) || 0;
      let streakCount = 0;
      const streakInterval = setInterval(() => {
        streakCount++;
        streakEl.textContent = streakCount;
        gsap.fromTo(streakEl, { scale: 1.15 }, { scale: 1, duration: 0.1 });
        if (streakCount >= streakTarget) {
          clearInterval(streakInterval);
          gsap.to(streakEl, { scale: 1.25, duration: 0.25, yoyo: true, repeat: 1, ease: "power2.inOut" });
        }
      }, 80);

      // 2. 统计数据卡片依次弹入
      const statCards = document.querySelectorAll('.card:not(:first-child)');
      gsap.fromTo(statCards,
        { opacity: 0, y: 40, scale: 0.9 },
        { opacity: 1, y: 0, scale: 1, duration: 0.55, stagger: 0.15, ease: "back.out(1.8)" }
      );

      // 3. 徽章依次弹入
      const badges = document.querySelectorAll('.badge-wrap');
      if (badges.length > 0) {
        gsap.fromTo(badges,
          { opacity: 0, scale: 0, y: 50 },
          { opacity: 1, scale: 1, y: 0, duration: 0.5, stagger: 0.18, ease: "back.out(2.2)" }
        );
      }
    });
  </script>
</body>
</html>
