<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>我的成就 - 竹笛助手</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body { padding-bottom: 80px; }
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; gap: 4px;
      padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
      background: var(--card, #fff); box-shadow: 0 -2px 12px rgba(0,0,0,0.1); z-index: 100;
    }
    .nav a {
      flex: 1; min-width: 0; padding: 14px 8px !important; background: transparent; border-radius: 16px;
      text-align: center; text-decoration: none; color: #7F8C8D; font-size: 16px !important;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .nav a:active { transform: scale(0.95); }
    .nav a.active { background: var(--primary, #FF6B6B); color: white; }
    .nav-icon { font-size: 20px; }

    .page-header {
      padding: 20px 16px 8px;
      font-size: 22px; font-weight: bold; color: #333;
      display: flex; align-items: center; justify-content: space-between;
    }

    /* 通用全宽卡片 */
    .ac-card {
      background: #fff; border-radius: 20px;
      padding: 16px; margin: 0 12px 12px;
    }

    /* ── 卡片1: 本周目标 ── */
    .week-label {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
    }
    .week-title { font-size: 16px; font-weight: bold; color: var(--primary, #FF6B35); }
    .week-sub { font-size: 14px; color: #7F8C8D; }
    .week-bar-bg {
      background: #F0F0F0; border-radius: 12px; height: 22px; overflow: hidden;
    }
    .week-bar-fill {
      background: linear-gradient(90deg, #FF6B35, #FF8C5A);
      height: 100%; border-radius: 12px; transition: width 0.6s ease;
    }
    .week-pct-text { text-align: center; margin-top: 5px; font-size: 13px; color: #7F8C8D; }

    /* ── 卡片2: 练习看板（4格横排） ── */
    .board-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .board-cell {
      text-align: center; padding: 12px 6px; border-radius: 14px;
    }
    .board-cell:nth-child(1) { background: #FFF3E0; }
    .board-cell:nth-child(2) { background: #E8F5E9; }
    .board-cell:nth-child(3) { background: #E3F2FD; }
    .board-cell:nth-child(4) { background: #FCE4EC; }
    .board-num { font-size: 26px; font-weight: bold; line-height: 1; }
    .board-cell:nth-child(1) .board-num { color: #FF6B35; }
    .board-cell:nth-child(2) .board-num { color: #27AE60; }
    .board-cell:nth-child(3) .board-num { color: #1976D2; }
    .board-cell:nth-child(4) .board-num { color: #E91E8C; }
    .board-label { font-size: 11px; color: #7F8C8D; margin-top: 4px; }
    .board-diff { font-size: 11px; margin-top: 2px; color: #888; }
    .board-diff.up { color: #27AE60; }

    /* ── 成就展示（与badges页面一致的结构） ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0 12px;
    }
    .section-header h3 {
      font-size: 14px;
      font-weight: 700;
      color: #333;
    }
    .section-count {
      font-size: 12px;
      color: #fff;
      background: #FF6B35;
      border-radius: 20px;
      padding: 1px 8px;
      font-weight: 600;
    }

    /* 2列固定网格 */
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    /* 统一卡片 */
    .b-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 18px 12px 14px;
      border-radius: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.2s, transform 0.2s;
    }
    .b-card.unlocked {
      background: #fffdf8;
      border: 1.5px solid #f0e0a0;
      box-shadow: 0 2px 10px rgba(200,160,40,0.1);
    }
    .b-card.unlocked::before {
      content: '';
      position: absolute;
      top: -10px; left: -10px;
      width: 70px; height: 70px;
      background: radial-gradient(circle, rgba(255,215,0,0.22) 0%, transparent 70%);
      pointer-events: none;
    }
    .b-card.unlocked:hover {
      box-shadow: 0 6px 20px rgba(200,160,40,0.22);
      transform: translateY(-2px);
    }
    .b-card.locked {
      background: #fffdf8;
      border: 1.5px solid #ece8e0;
    }
    /* 锁卡：CSS filter 直接灰化原图，简单可靠 */
    .b-card.locked .b-name { color: #bbb; }
    .b-card.locked .b-img {
      opacity: 0.65;
      filter: grayscale(1) brightness(1.05);
    }
    .b-card.locked .b-img-wrap {
      background-color: #fffdf8;
    }

    /* 120×120徽章 */
    .b-img-wrap {
      width: 120px; height: 120px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 10px;
    }
    .b-img {
      max-width: 120px; max-height: 120px;
      width: auto; height: auto;
      filter: drop-shadow(0 4px 10px rgba(180,140,20,0.4));
      transition: filter 0.2s, transform 0.2s;
    }
    .b-card.unlocked:hover .b-img {
      filter: drop-shadow(0 8px 16px rgba(180,140,20,0.55));
      transform: scale(1.06);
    }

    .b-name {
      font-size: 15px;
      font-weight: 700;
      color: #c8860a;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    .b-card.locked .b-name { color: #bbb; }

    .b-tag {
      font-size: 11px;
      font-weight: 500;
      color: #aaa;
      background: rgba(240,235,225,0.6);
      border: 1px solid rgba(0,0,0,0.07);
      border-radius: 20px;
      padding: 2px 10px;
      display: inline-flex; align-items: center;
    }
    .b-tag.突破 { background: rgba(255,210,210,0.5); border-color: rgba(220,120,120,0.25); color: #c0504d; }
    .b-tag.巅峰 { background: rgba(230,210,255,0.5); border-color: rgba(180,130,230,0.25); color: #8060c0; }
    .b-tag.段位 { background: rgba(255,240,180,0.5); border-color: rgba(220,180,60,0.30); color: #a08020; }
    .b-tag.执着 { background: rgba(210,230,255,0.5); border-color: rgba(120,170,220,0.25); color: #4070a0; }
    .b-card.locked .b-lock {
      position: absolute;
      bottom: 10px; right: 12px;
      width: 20px; height: 20px;
      font-size: 14px; opacity: 0.55;
    }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/prepare" class="nav-item"><span class="nav-icon">🏠</span><span>准备</span></a>
    <a href="/practice" class="nav-item"><span class="nav-icon">🎵</span><span>练习</span></a>
    <a href="/achievements" class="nav-item active"><span class="nav-icon">🏆</span><span>成就</span></a>
    <a href="/report" class="nav-item"><span class="nav-icon">📊</span><span>报告</span></a>
    <a href="/praise" class="nav-item"><span class="nav-icon">⭐</span><span>表扬</span></a>
  </div>

    <div class="page-header">
      <span>🏆 我的成就</span>
    </div>

  <!-- 卡片1: 本周目标 -->
  <div class="ac-card" id="card-week">
    <div class="week-label">
      <span class="week-title">📅 本周目标</span>
      <span class="week-sub">{{week_pct_text}}</span>
    </div>
    <div class="week-bar-bg">
      <div class="week-bar-fill" style="width:{{week_pct}}%;"></div>
    </div>
    <div class="week-pct-text">{{week_pct}}% 完成</div>
  </div>

  <!-- 卡片2: 练习看板 -->
  <div class="ac-card" id="card-board">
    <h3 style="font-size:15px;font-weight:bold;color:#333;margin:0 0 10px;">📊 练习看板</h3>
    <div class="board-grid">
      <div class="board-cell">
        <div class="board-num">{{streak}}</div>
        <div class="board-label">连续（天）</div>
      </div>
      <div class="board-cell">
        <div class="board-num">{{yesterday_mins}}</div>
        <div class="board-label">昨天（分）</div>
        <div class="board-diff {{yesterday_pos}}">{{yesterday_diff}}</div>
      </div>
      <div class="board-cell">
        <div class="board-num">{{week_days}}</div>
        <div class="board-label">本周（天）</div>
        <div class="board-diff {{week_pos}}">{{week_diff}}</div>
      </div>
      <div class="board-cell">
        <div class="board-num">{{month_days}}</div>
        <div class="board-label">本月（天）</div>
        <div class="board-diff {{month_pos}}">{{month_diff}}</div>
      </div>
    </div>
  </div>

  <!-- 卡片3: 成就展示（2列网格，与badges页面结构一致） -->
  <div class="ac-card" id="card-milestones">
    <div class="page-header" style="padding:0 0 4px;">
      <span>🏅 成就展示</span>
      <a href="/badges" style="font-size:13px;font-weight:600;color:#FF6B35;text-decoration:none;">显示全部 →</a>
    </div>

    <div class="section-header">
      <h3>已解锁</h3>
      <span class="section-count" id="unlocked-count">9</span>
    </div>
    <div class="badge-grid" id="unlocked-grid">{{milestone_html}}</div>

    <div class="section-header" style="margin-top:20px;">
      <h3>未解锁</h3>
      <span class="section-count" id="locked-count">1</span>
    </div>
    <div class="badge-grid" id="locked-grid"></div>
  </div>



  <!-- 弹窗（照搬 badges 页面） -->
  <div id="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div id="modal-box">
      <div id="modal-close" onclick="closeModal()">×</div>
      <div id="modal-img-wrap">
        <img id="modal-img" src="" alt="">
      </div>
      <div id="modal-name"></div>
      <div id="modal-tag"></div>
      <div class="modal-divider"></div>
      <div id="modal-cond"></div>
      <div id="modal-date"></div>
      <div id="modal-desc"></div>
      <div id="modal-hint"></div>
    </div>
  </div>

  <style>
    /* 弹窗 */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    #modal-overlay.active { display: flex; }
    #modal-box {
      background: #fffdf8;
      border-radius: 24px;
      border: 2.5px solid #f0c040;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      width: 100%; max-width: 310px;
      padding: 30px 26px 24px;
      display: flex; flex-direction: column; align-items: center;
      position: relative;
    }
    #modal-close {
      position: absolute; top: -10px; right: -10px;
      width: 36px; height: 36px;
      background: #fff; border: 2px solid #f0c040;
      border-radius: 50%;
      font-size: 20px; color: #c8860a; line-height: 32px; text-align: center;
      cursor: pointer; font-weight: 900;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    #modal-close:active { transform: scale(0.9); }
    #modal-img-wrap {
      width: 156px; height: 156px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
    }
    #modal-img { width: 156px; height: 156px; object-fit: contain; }
    #modal-name {
      font-size: 26px; font-weight: 900; color: #c8860a;
      text-align: center; margin-bottom: 8px; letter-spacing: 0.5px;
    }
    #modal-tag {
      font-size: 12px; font-weight: 700;
      color: #ccc; letter-spacing: 0.8px;
      margin-bottom: 18px;
    }
    .modal-divider {
      width: 40px; height: 2px; background: #f0c040;
      border-radius: 2px; margin-bottom: 16px;
    }
    #modal-cond {
      font-size: 16px; color: #666; text-align: center;
      margin-bottom: 6px; font-weight: 600;
    }
    #modal-date {
      font-size: 13px; color: #ccc; margin-bottom: 16px;
    }
    #modal-desc {
      font-size: 16px; color: #a08060;
      text-align: center; font-style: italic;
      line-height: 1.6;
      border-top: 1px solid #f0e8d0;
      padding-top: 16px; width: 100%;
    }
    #modal-hint {
      font-size: 13px; color: #bbb; text-align: center; margin-top: 10px;
    }
  </style>

  <script>
    // ── 弹窗 ───────────────────────────────────────────────────────
    function openModal(card) {
      const locked  = card.dataset.locked === 'yes';
      const overlay = document.getElementById('modal-overlay');
      const box     = document.getElementById('modal-box');

      document.getElementById('modal-img').src = card.dataset.img;
      document.getElementById('modal-img').style.filter =
        locked ? 'saturate(0) brightness(0.7)' : '';
      document.getElementById('modal-name').textContent = card.dataset.name;
      document.getElementById('modal-tag').textContent  = card.dataset.tag;
      document.getElementById('modal-cond').textContent = card.dataset.cond;

      const dateEl = document.getElementById('modal-date');
      const dateVal = card.dataset.date;
      if (dateVal) {
        try {
          const d = new Date(dateVal);
          dateEl.textContent = d.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
        } catch(e) { dateVal = ''; }
        dateEl.style.display = dateVal ? '' : 'none';
      } else {
        dateEl.style.display = 'none';
      }

      document.getElementById('modal-desc').textContent = card.dataset.desc;
      document.getElementById('modal-hint').textContent =
        locked ? '继续加油，下一个成就在等你！' : '';

      overlay.classList.add('active');

      const cr = card.getBoundingClientRect();
      const mr = box.getBoundingClientRect();
      const fromX = cr.left + cr.width/2  - (mr.left + mr.width/2);
      const fromY = cr.top  + cr.height/2 - (mr.top  + mr.height/2);

      gsap.set(box, { x: fromX*0.6, y: fromY*0.6, scale: 0.5, opacity: 0 });
      gsap.set(overlay, { backgroundColor: 'rgba(0,0,0,0)' });

      const tl = gsap.timeline();
      tl.to(overlay, { backgroundColor: 'rgba(0,0,0,0.45)', duration: 0.15, ease:'power2.out' })
        .to(box, { x:0, y:0, scale:1, opacity:1, duration:0.22, ease:'back.out(1.5)' }, 0)
        .from('#modal-img-wrap', { opacity:0, y:6, duration:0.12, ease:'power2.out' }, 0.14)
        .from('#modal-name',    { opacity:0, y:4, duration:0.12, ease:'power2.out' }, 0.17)
        .from('#modal-tag',     { opacity:0, y:4, duration:0.12, ease:'power2.out' }, 0.19)
        .from('.modal-divider', { opacity:0, scaleX:0, duration:0.1,  ease:'back.out(2)' }, 0.21)
        .from('#modal-cond',    { opacity:0, y:4, duration:0.12, ease:'power2.out' }, 0.23)
        .from('#modal-date',    { opacity:0, y:4, duration:0.12, ease:'power2.out' }, 0.25)
        .from('#modal-desc',    { opacity:0, y:4, duration:0.12, ease:'power2.out' }, 0.27)
        .from('#modal-hint',    { opacity:0, y:4, duration:0.12, ease:'power2.out' }, 0.29);
    }

    function closeModal() {
      const overlay = document.getElementById('modal-overlay');
      const box     = document.getElementById('modal-box');
      gsap.to(box, { scale: 0.8, opacity: 0, duration: 0.15, ease:'power2.in',
        onComplete: () => overlay.classList.remove('active') });
      gsap.to(overlay, { backgroundColor: 'rgba(0,0,0,0)', duration: 0.15 });
    }

    document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

    // ── 页面初始化 ────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      const cards = document.querySelectorAll('.ac-card');
      gsap.fromTo(cards,
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.45, stagger: 0.1, ease: "back.out(1.6)" }
      );

      // 拆分已解锁/未解锁到两个网格
      const unlockedGrid = document.getElementById('unlocked-grid');
      const lockedGrid   = document.getElementById('locked-grid');
      const allCards     = unlockedGrid.querySelectorAll('.b-card');

      const lockedCards    = [...allCards].filter(c => c.classList.contains('locked'));
      const unlockedCards   = [...allCards].filter(c => !c.classList.contains('locked'));

      lockedCards.forEach(c => lockedGrid.appendChild(c));
      document.getElementById('unlocked-count').textContent = unlockedCards.length;
      document.getElementById('locked-count').textContent   = lockedCards.length;

      // GSAP 入场动画
      const allBCards = document.querySelectorAll('.b-card');
      gsap.fromTo(allBCards,
        { opacity: 0, scale: 0.88, y: 12 },
        { opacity: 1, scale: 1, y: 0, duration: 0.38, stagger: 0.07, ease: 'back.out(1.7)' }
      );

      // hover: badge弹跳
      allBCards.forEach(card => {
        const imgWrap = card.querySelector('.b-img-wrap');
        if (!imgWrap) return;
        card.addEventListener('mouseenter', () => {
          gsap.to(imgWrap, { scale: 1.1, duration: 0.25, ease: 'back.out(2.2)' });
        });
        card.addEventListener('mouseleave', () => {
          gsap.to(imgWrap, { scale: 1, duration: 0.3, ease: 'elastic.out(1, 0.5)' });
        });
      });
    });
  </script>
</body>
</html>
