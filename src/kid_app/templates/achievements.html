<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>我的成就 - 竹笛助手</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body { padding-bottom: 80px; }
    .nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; gap: 4px;
      padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
      background: var(--card, #fff); box-shadow: 0 -2px 12px rgba(0,0,0,0.1); z-index: 100;
    }
    .nav a {
      flex: 1; min-width: 0; padding: 14px 8px !important; background: transparent; border-radius: 16px;
      text-align: center; text-decoration: none; color: #7F8C8D; font-size: 16px !important;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
    }
    .nav a:active { transform: scale(0.95); }
    .nav a.active { background: var(--primary, #FF6B6B); color: white; }
    .nav-icon { font-size: 20px; }

    .page-header {
      padding: 20px 16px 8px;
      font-size: 22px; font-weight: bold; color: #333;
    }

    /* 通用全宽卡片 */
    .ac-card {
      background: #fff; border-radius: 20px;
      padding: 16px; margin: 0 12px 12px;
    }

    /* ── 卡片1: 本周目标 ── */
    .week-label {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
    }
    .week-title { font-size: 16px; font-weight: bold; color: var(--primary, #FF6B35); }
    .week-sub { font-size: 14px; color: #7F8C8D; }
    .week-bar-bg {
      background: #F0F0F0; border-radius: 12px; height: 22px; overflow: hidden;
    }
    .week-bar-fill {
      background: linear-gradient(90deg, #FF6B35, #FF8C5A);
      height: 100%; border-radius: 12px; transition: width 0.6s ease;
    }
    .week-pct-text { text-align: center; margin-top: 5px; font-size: 13px; color: #7F8C8D; }

    /* ── 卡片2: 练习看板（4格横排） ── */
    .board-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .board-cell {
      text-align: center; padding: 12px 6px; border-radius: 14px;
    }
    .board-cell:nth-child(1) { background: #FFF3E0; }
    .board-cell:nth-child(2) { background: #E8F5E9; }
    .board-cell:nth-child(3) { background: #E3F2FD; }
    .board-cell:nth-child(4) { background: #FCE4EC; }
    .board-num { font-size: 26px; font-weight: bold; line-height: 1; }
    .board-cell:nth-child(1) .board-num { color: #FF6B35; }
    .board-cell:nth-child(2) .board-num { color: #27AE60; }
    .board-cell:nth-child(3) .board-num { color: #1976D2; }
    .board-cell:nth-child(4) .board-num { color: #E91E8C; }
    .board-label { font-size: 11px; color: #7F8C8D; margin-top: 4px; }
    .board-diff { font-size: 11px; margin-top: 2px; color: #888; }
    .board-diff.up { color: #27AE60; }

    /* ── 卡片3: 勋章展示（单列左右结构） ── */
    .milestone-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .milestone-card {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 22px 18px;
      border-radius: 22px;
      background: #fffdf8;
      border: 2px solid #f5e8c0;
      box-shadow: 0 4px 16px rgba(200,160,60,0.12);
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .milestone-card::before {
      content: '';
      position: absolute;
      top: -20px; left: -20px;
      width: 80px; height: 80px;
      background: radial-gradient(circle, rgba(255,215,0,0.3) 0%, transparent 70%);
      pointer-events: none;
    }
    .milestone-card:hover {
      box-shadow: 0 10px 32px rgba(200,160,60,0.26);
      border-color: #f0c040;
    }

    .milestone-badge-wrap {
      flex-shrink: 0;
      width: 120px; height: 120px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(180,140,20,0.3);
    }
    .milestone-badge-wrap img {
      width: 120px; height: 120px;
      object-fit: contain;
    }
    .milestone-info { flex: 1; min-width: 0; text-align: left; }
    .milestone-label {
      font-size: 18px; font-weight: 800; color: #c8860a;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .milestone-value { font-size: 16px; color: #333; margin-bottom: 6px; font-weight: 600; }
    .milestone-desc { font-size: 13px; color: #a08060; font-style: italic; line-height: 1.4; }

    .milestone-card .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,200,50,0.3);
      transform: scale(0); animation: ripple-out 0.5s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple-out {
      to { transform: scale(4); opacity: 0; }
    }

    /* ── 卡片4: 更多勋章入口 ── */
    .more-card {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; text-decoration: none; color: inherit; cursor: pointer;
      padding: 12px;
    }
    .more-card:active { transform: scale(0.97); }
    .more-icons { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; justify-content: center; }
    .more-icon-chip { font-size: 24px; }
    .more-arrow { font-size: 20px; color: #FF6B35; }
    .more-label { font-size: 14px; color: #7F8C8D; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="nav">
    <a href="/prepare" class="nav-item"><span class="nav-icon">🏠</span><span>准备</span></a>
    <a href="/practice" class="nav-item"><span class="nav-icon">🎵</span><span>练习</span></a>
    <a href="/achievements" class="nav-item active"><span class="nav-icon">🏆</span><span>成就</span></a>
    <a href="/report" class="nav-item"><span class="nav-icon">📊</span><span>报告</span></a>
    <a href="/praise" class="nav-item"><span class="nav-icon">⭐</span><span>表扬</span></a>
  </div>

  <div class="page-header">🏆 我的成就</div>

  <!-- 卡片1: 本周目标 -->
  <div class="ac-card" id="card-week">
    <div class="week-label">
      <span class="week-title">📅 本周目标</span>
      <span class="week-sub">{{week_pct_text}}</span>
    </div>
    <div class="week-bar-bg">
      <div class="week-bar-fill" style="width:{{week_pct}}%;"></div>
    </div>
    <div class="week-pct-text">{{week_pct}}% 完成</div>
  </div>

  <!-- 卡片2: 练习看板 -->
  <div class="ac-card" id="card-board">
    <h3 style="font-size:15px;font-weight:bold;color:#333;margin:0 0 10px;">📊 练习看板</h3>
    <div class="board-grid">
      <div class="board-cell">
        <div class="board-num">{{streak}}</div>
        <div class="board-label">连续（天）</div>
      </div>
      <div class="board-cell">
        <div class="board-num">{{yesterday_mins}}</div>
        <div class="board-label">昨天（分）</div>
        <div class="board-diff {{yesterday_pos}}">{{yesterday_diff}}</div>
      </div>
      <div class="board-cell">
        <div class="board-num">{{week_days}}</div>
        <div class="board-label">本周（天）</div>
        <div class="board-diff {{week_pos}}">{{week_diff}}</div>
      </div>
      <div class="board-cell">
        <div class="board-num">{{month_days}}</div>
        <div class="board-label">本月（天）</div>
        <div class="board-diff {{month_pos}}">{{month_diff}}</div>
      </div>
    </div>
  </div>

  <!-- 卡片3: 勋章展示 -->
  <div class="ac-card" id="card-milestones">
    <h3 style="font-size:15px;font-weight:bold;color:#333;margin:0 0 10px;">🏅 勋章展示</h3>
    <div class="milestone-grid">
      {{milestone_html}}
    </div>
  </div>

    <!-- 卡片4: 更多勋章入口 -->
  <div class="ac-card" id="card-more" style="padding:8px;">
    <a href="/badges" class="more-card">
      <div class="more-icons">
        <img src="/static/badges/streak_3.png" style="width:32px;height:32px;object-fit:contain;">
        <img src="/static/badges/total_60.png" style="width:32px;height:32px;object-fit:contain;">
        <img src="/static/badges/first_log.png" style="width:32px;height:32px;object-fit:contain;">
      </div>
      <div class="more-arrow">→</div>
      <div class="more-label">查看全部勋章墙</div>
    </a>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const cards = document.querySelectorAll('.ac-card');
      gsap.fromTo(cards,
        { opacity: 0, y: 20 },
        { opacity: 1, y: 0, duration: 0.45, stagger: 0.1, ease: "back.out(1.6)" }
      );

      /* ── 勋章卡 GSAP 交互 ─────────────────────────── */
      const milestoneCards = document.querySelectorAll('.milestone-card');

      // hover: badge 弹跳 + 卡片微微上移
      milestoneCards.forEach(card => {
        const badgeWrap = card.querySelector('.milestone-badge-wrap');
        if (!badgeWrap) return;

        card.addEventListener('mouseenter', () => {
          gsap.to(card, { y: -3, duration: 0.2, ease: 'power2.out' });
          gsap.to(badgeWrap, {
            scale: 1.15,
            duration: 0.3,
            ease: 'back.out(2.5)'
          });
        });

        card.addEventListener('mouseleave', () => {
          gsap.to(card, { y: 0, duration: 0.25, ease: 'power2.out' });
          gsap.to(badgeWrap, {
            scale: 1,
            duration: 0.3,
            ease: 'elastic.out(1, 0.5)'
          });
        });

        // click: 涟漪扩散 + badge 快速缩放
        card.addEventListener('click', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;

          const ripple = document.createElement('div');
          ripple.className = 'ripple';
          ripple.style.cssText = `left:${x - 20}px;top:${y - 20}px;width:40px;height:40px;`;
          card.appendChild(ripple);
          setTimeout(() => ripple.remove(), 600);

          gsap.timeline()
            .to(badgeWrap, { scale: 0.82, duration: 0.12, ease: 'power2.in' })
            .to(badgeWrap, { scale: 1.12, duration: 0.18, ease: 'back.out(3)' })
            .to(badgeWrap, { scale: 1, duration: 0.25, ease: 'elastic.out(1.2, 0.4)' });
        });
      });
    });
  </script>
</body>
</html>
